<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>差旅明細整理系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft JhengHei", "Segoe UI", sans-serif; background: #f0f4f8; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #1e3a5f 0%, #4a90d9 100%); color: white; padding: 30px; border-radius: 12px; margin-bottom: 24px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        header h1 { font-size: 28px; margin-bottom: 8px; }
        header p { opacity: 0.85; font-size: 15px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { font-size: 18px; color: #1e3a5f; margin-bottom: 16px; }
        .upload-zone { border: 2px dashed #b0c4de; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; background: #f8fafc; }
        .upload-zone:hover, .upload-zone.dragover { border-color: #4a90d9; background: #eef4fb; transform: scale(1.01); }
        .upload-zone .icon { font-size: 48px; margin-bottom: 12px; }
        .upload-zone p { color: #666; margin-bottom: 8px; }
        .upload-zone .hint { font-size: 13px; color: #999; }
        #fileInput { display: none; }
        .file-info { margin-top: 16px; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #eef4fb; border-radius: 8px; border: 1px solid #d5e3f0; }
        .file-info .name { font-weight: 600; color: #1e3a5f; }
        .file-info .size { color: #888; font-size: 13px; }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-outline { background: white; color: #4a90d9; border: 2px solid #4a90d9; }
        .btn-outline:hover { background: #eef4fb; }
        .btn-group { display: flex; gap: 12px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
        .progress-area { display: none; }
        .progress-bar { height: 6px; background: #e8edf2; border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
        .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #4a90d9, #27ae60); border-radius: 3px; transition: width 0.3s; width: 0%; }
        .log { background: #1e2a3a; color: #a8d8a8; border-radius: 8px; padding: 16px; font-family: "Consolas", monospace; font-size: 13px; max-height: 180px; overflow-y: auto; line-height: 1.6; }
        .result-area { display: none; }
        .result-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #f8fafc, #eef4fb); padding: 14px; border-radius: 10px; text-align: center; border: 1px solid #d5e3f0; }
        .stat-card .number { font-size: 24px; font-weight: 700; color: #1e3a5f; }
        .stat-card .label { font-size: 12px; color: #666; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 8px; table-layout: fixed; }
        th { background: #4a90d9; color: white; padding: 10px 8px; text-align: center; position: sticky; top: 0; z-index: 1; white-space: nowrap; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        td:first-child, th:first-child { text-align: left; }
        .text-right { text-align: right !important; }
        tr:hover { background: #f0f7ff; }
        .total-row { background: #d9e2f3 !important; font-weight: 700; }
        .table-wrap { max-height: 450px; overflow-y: auto; border: 1px solid #e8edf2; border-radius: 8px; }
        .text-right { text-align: right; }
        .filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-bar label { font-weight: 600; color: #1e3a5f; white-space: nowrap; }
        .filter-bar select { padding: 10px 14px; border: 2px solid #d5e3f0; border-radius: 8px; font-size: 15px; font-family: inherit; background: white; min-width: 220px; cursor: pointer; }
        .filter-bar select:focus { border-color: #4a90d9; outline: none; }
        .selected-info { background: #fff8e1; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 15px; }
        .selected-info strong { color: #e65100; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>差旅明細整理系統</h1>
        <p>上傳 XLS 旅費彙整表 → 選擇衛生所 → 查看明細與個人小計 → 下載 Excel</p>
        <p style="opacity:0.6; font-size:12px; margin-top:4px;">v4.1 (2026-04-14)</p>
    </header>

    <div class="card" id="uploadCard">
        <h2>📤 上傳檔案（一次一份，上傳即處理）</h2>
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="icon">📁</div>
            <p>點擊或拖曳 XLS 檔案到此處</p>
            <div class="hint">支援 .xls 格式，上傳後自動處理</div>
        </div>
        <input type="file" id="fileInput" accept=".xls,.xlsx">
        <div id="fileInfo" style="display:none"></div>
    </div>

    <div class="progress-area" id="progressArea">
        <div class="card">
            <h2>⏳ 處理中...</h2>
            <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
            <div class="log" id="logArea"></div>
        </div>
    </div>

    <div class="result-area" id="resultArea">
        <div class="card">
            <h2>📊 處理結果</h2>
            <div class="result-summary" id="resultSummary"></div>
            <div class="btn-group">
                <button class="btn btn-success" onclick="downloadExcel()">📥 下載 Excel 總表</button>
                <button class="btn btn-outline" onclick="resetPage()">🔄 處理另一份</button>
            </div>
        </div>

        <div class="card" id="filterCard">
            <h2>🏥 選擇衛生所</h2>
            <div class="filter-bar">
                <label>衛生所：</label>
                <select id="officeSelect" onchange="filterByOffice()">
                    <option value="">-- 全部衛生所 --</option>
                </select>
            </div>
            <div id="selectedInfo" style="display:none" class="selected-info"></div>
        </div>

        <div class="card" id="detailCard" style="display:none">
            <h2 id="detailTitle">📋 出差明細</h2>
            <div class="table-wrap" id="officeTable"></div>
        </div>

        <div class="card" id="personCard" style="display:none">
            <h2 id="personTitle">👤 個人小計</h2>
            <div class="table-wrap" id="personDetail"></div>
        </div>
    </div>
</div>

<script>
// ===== 全域變數 =====
let resultData = null;

// ===== 衛生所代碼對照表 =====
const OFFICE_CODE_MAP = {
    'z01':'仁德區衛生所','z02':'歸仁鄉衛生所','z03':'關廟區衛生所','z04':'龍崎區衛生所',
    'z05':'永康區衛生所','z06':'新化區衛生所','z07':'善化區衛生所','z08':'新市區衛生所',
    'z09':'安定區衛生所','z10':'山上區衛生所','z11':'玉井區衛生所','z12':'楠西區衛生所',
    'z13':'南化區衛生所','z14':'左鎮區衛生所','z15':'麻豆區衛生所','z16':'下營區衛生所',
    'z17':'六甲區衛生所','z18':'官田區衛生所','z19':'大內區衛生所','z20':'佳里區衛生所',
    'z21':'西港區衛生所','z22':'七股區衛生所','z23':'將軍區衛生所','z24':'北門區衛生所',
    'z25':'學甲區衛生所','z26':'新營區衛生所','z27':'鹽水區衛生所','z28':'白河區衛生所',
    'z29':'柳營區衛生所','z30':'後壁區衛生所','z31':'東山區衛生所','z32':'東區衛生所',
    'z33':'南區衛生所','z34':'中西區衛生所','z35':'北區衛生所','z36':'安南區衛生所',
    'z37':'安平區衛生所'
};
function resolveOffice(name) {
    if (!name) return name;
    const key = name.trim().toLowerCase();
    return OFFICE_CODE_MAP[key] || name;
}

// ===== 上傳處理 =====
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});
document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

function handleFile(file) {
    if (!file.name.match(/\.xlsx?$/i)) { alert('請上傳 .xls 格式檔案'); return; }

    // 顯示檔案資訊
    document.getElementById('fileInfo').style.display = 'flex';
    document.getElementById('fileInfo').className = 'file-info';
    document.getElementById('fileInfo').innerHTML = `
        <span class="name">📄 ${file.name}</span>
        <span class="size">${(file.size / 1024).toFixed(1)} KB</span>
    `;

    // 直接開始處理
    processFile(file);
}

function resetPage() {
    resultData = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('fileInfo').style.display = 'none';
    document.getElementById('progressArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('uploadCard').style.display = 'block';
}

// ===== 從檔名提取標題 =====
function extractFileTitle(filename) {
    const name = filename.replace(/\.xlsx?$/i, '');
    // 格式1: "79,054元115年衛生所第3次旅費彙整表 (1)" → "115年衛生所第3次旅費"
    let m = name.match(/[\d,]+元(\d+年衛生所第\d+次[^\s(（]+)/);
    if (m) return m[1].replace(/彙整表$/, '').replace(/員整表$/, '');
    // 格式2: "衛生所代辦經費彙整表1140312" → 原樣
    m = name.match(/(衛生所[^\s(（]+)/);
    if (m) return m[1];
    // 格式3: "114年衛生所第4次差旅費彙整表 (1)" → "114年衛生所第4次差旅費"
    m = name.match(/(\d+年衛生所第\d+次[^\s(（]+)/);
    if (m) return m[1].replace(/彙整表$/, '').replace(/員整表$/, '');
    return name.replace(/\s*[\(（]\d+[\)）]\s*$/, '');
}

// ===== 姓名拆分 =====
function cleanPersonName(s) {
    if (!s) return '';
    s = s.trim();
    // 提取純中文姓名（2~4字中文）
    const m = s.match(/([\u4e00-\u9fff]{2,4})/);
    return m ? m[1] : '';
}

function splitPersons(personStr, totalAmount) {
    if (!personStr || !personStr.trim()) return [{ name: '', amount: totalAmount }];
    let text = cleanPersonName(personStr);

    // 用 + 分割
    const parts = text.split(/[+＋]/);
    let results = [];

    for (let part of parts) {
        part = part.trim();
        if (!part) continue;
        // 用頓號分割
        const subs = part.split(/[、,，]/);
        for (let sp of subs) {
            sp = sp.trim();
            if (!sp) continue;
            // 姓名$金額*N人
            let m = sp.match(/^(.+?)\$(\d+(?:\.\d+)?)\*(\d+)人?$/);
            if (m) { results.push({ name: m[1].trim(), amount: parseFloat(m[2]) }); continue; }
            // 姓名$金額
            m = sp.match(/^(.+?)\$(\d+(?:\.\d+)?)$/);
            if (m) { results.push({ name: m[1].trim(), amount: parseFloat(m[2]) }); continue; }
            // 純姓名
            results.push({ name: sp, amount: 0 });
        }
    }

    if (results.length === 1 && results[0].amount === 0)
        return [{ name: results[0].name, amount: totalAmount }];

    // 分配沒金額的人
    const hasAmt = results.filter(r => r.amount > 0);
    const noAmt = results.filter(r => r.amount === 0);
    if (noAmt.length > 0 && hasAmt.length > 0) {
        const used = hasAmt.reduce((s, r) => s + r.amount, 0);
        const per = (totalAmount - used) / noAmt.length;
        return [...hasAmt, ...noAmt.map(r => ({ name: r.name, amount: per }))];
    }
    if (noAmt.length > 0 && hasAmt.length === 0) {
        const per = totalAmount / results.length;
        return results.map(r => ({ name: r.name, amount: per }));
    }
    return results.length > 0 ? results : [{ name: '', amount: totalAmount }];
}

// ===== 清理分頁名稱（去除前導頁碼如 "7", "8.", "13."） =====
function cleanSheetName(name) {
    // 有點的：2.支援→支援, 13.11-12月→11-12月, 8.1月→1月
    let s = name.replace(/^\d+\.\s*/, '');
    if (s !== name) return s;
    // 無點的：70126低碳→0126低碳（去掉第一個頁碼數字）
    return name.replace(/^\d/, '');
}

// ===== 跳過行判斷 =====
function isSkipRow(row) {
    const t = row.map(v => String(v)).join('').replace(/\s/g, '');
    return t.includes('合計') || t.includes('總計') || t.includes('製表') || t.includes('股長');
}

function isValidOffice(name) {
    if (!name) return false;
    const clean = name.replace(/\s/g, '');
    if (!clean) return false;
    if (clean.includes('總計') || clean.includes('合計') || clean.includes('製表')) return false;
    // 接受代碼 (z01~z37)
    if (OFFICE_CODE_MAP[clean.toLowerCase()]) return true;
    // 必須含有「衛生所」或「區」等中文地名關鍵字
    if (clean.includes('衛生所') || clean.includes('衛生局')) return true;
    if (/[\u4e00-\u9fff].*區/.test(clean)) return true;
    if (clean === '(傳票明細)') return true;
    return false;
}

function safeFloat(v) {
    if (v === null || v === undefined || v === '') return 0;
    if (typeof v === 'number') return v;
    const s = String(v).trim();
    if (/^-?\d+(\.\d+)?$/.test(s)) return parseFloat(s);
    return 0;
}

function getRow(sheet, r) {
    const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
    const row = [];
    for (let c = range.s.c; c <= range.e.c; c++) {
        const addr = XLSX.utils.encode_cell({ r, c });
        const cell = sheet[addr];
        row.push(cell ? (cell.v !== undefined ? cell.v : '') : '');
    }
    return row;
}

function sheetRows(sheet) {
    const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
    return range.e.r + 1;
}

function sheetCols(sheet) {
    const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
    return range.e.c + 1;
}

// ===== 偵測分頁類型 =====
function detectSheetType(sheet, name, idx) {
    const nrows = sheetRows(sheet);
    const ncols = sheetCols(sheet);
    if (nrows < 3) return 'empty';

    let hasData = false;
    for (let r = 0; r < Math.min(nrows, 10); r++) {
        const row = getRow(sheet, r);
        if (row.some(v => String(v).trim())) { hasData = true; break; }
    }
    if (!hasData) return 'empty';

    // 彙總表
    if (name.includes('彙總') || idx === 0) {
        for (let r = 0; r < Math.min(nrows, 3); r++) {
            const t = getRow(sheet, r).join('');
            if (t.includes('匯款明細') || t.includes('彙總')) return 'summary';
        }
    }

    let headerText = '';
    for (let r = 0; r < Math.min(nrows, 10); r++) headerText += getRow(sheet, r).join('');

    if (ncols <= 4) {
        for (let r = 0; r < Math.min(nrows, 5); r++) {
            const t = getRow(sheet, r).join('');
            if (t.includes('編號') && (t.includes('鄉鎮別') || t.includes('金額')))
                return 'overtime_summary';
        }
    }

    if (headerText.includes('姓   名') && headerText.includes('出   差')) return 'travel_traffic';
    if (headerText.includes('領受人')) {
        return (name.includes('加班') || headerText.includes('加班')) ? 'overtime_detail' : 'travel_detail';
    }
    // 傳票格式：金額拆成百萬/十萬/萬/千/百/十/元 (要在 travel_list 前偵測)
    if (headerText.includes('差旅費明細') || (headerText.includes('名    稱') && headerText.includes('金     額')))
        return 'voucher_detail';

    if (headerText.includes('旅費明細') || headerText.includes('金額(元)') || headerText.includes('金額（元）'))
        return 'travel_list';

    for (let r = 0; r < Math.min(nrows, 5); r++) {
        const t = getRow(sheet, r).join('');
        if ((t.includes('衛生所') || t.includes('鄉鎮')) && (t.includes('金額') || t.includes('備註')))
            return 'travel_list';
    }

    return 'empty';
}

// ===== 智慧欄位偵測 =====
function findHeaderRow(sheet, keyword) {
    // 尋找真正的欄位標題列（多個欄位關鍵字分佈在不同 cell）
    const nrows = sheetRows(sheet);
    for (let r = 0; r < Math.min(nrows, 15); r++) {
        const row = getRow(sheet, r);
        const cells = row.map(v => String(v).trim()).filter(s => s);
        // 欄位標題列：至少2個不同cell有關鍵字
        let hits = 0;
        cells.forEach(s => {
            if (s === '領受人' || s.includes('衛生所') || s === '所別' || s === '金額' || s === '總計' || s.includes('備註') || s === '編號' || s.includes('衛生所名稱')) hits++;
        });
        if (hits >= 2 && row.some(v => String(v).trim() === keyword || String(v).trim().includes(keyword))) {
            return r;
        }
    }
    // fallback: 找包含 keyword 的行（但只在獨立 cell 中）
    for (let r = 0; r < Math.min(nrows, 15); r++) {
        const row = getRow(sheet, r);
        if (row.some(v => { const s = String(v).trim(); return s === keyword || (s.length < 10 && s.includes(keyword)); })) {
            return r;
        }
    }
    return -1;
}

function detectColumns(sheet, headerRow) {
    const row = getRow(sheet, headerRow);
    let officeCol = -1, personCol = -1, amountCol = -1, noteCol = -1;
    row.forEach((v, c) => {
        const s = String(v).trim();
        if ((s.includes('衛生所') || s === '所別' || s.includes('衛生所名稱') || s === '鄉鎮別') && officeCol === -1) officeCol = c;
        if (s.includes('領受人') && personCol === -1) personCol = c;
        if ((s === '金額' || (s.includes('金額') && !s.includes('總'))) && amountCol === -1) amountCol = c;
        if (s === '總計' && amountCol === -1) amountCol = c;
        if (s.includes('備註') && noteCol === -1) noteCol = c;
    });
    return { officeCol, personCol, amountCol, noteCol };
}

// ===== 解析各類型 =====
function extractOvertimeDetail(sheet, sheetName, fileLabel) {
    const nrows = sheetRows(sheet);
    const records = [];
    let currentOffice = '';

    const hdr = findHeaderRow(sheet, '領受人');
    const startRow = hdr >= 0 ? hdr + 1 : 6;
    const cols = hdr >= 0 ? detectColumns(sheet, hdr) : {};
    const officeCol = cols.officeCol >= 0 ? cols.officeCol : 1;
    const personCol = cols.personCol >= 0 ? cols.personCol : 2;
    const amountCol = cols.amountCol >= 0 ? cols.amountCol : 5;
    const noteCol = cols.noteCol >= 0 ? cols.noteCol : 7;

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row) || !row.some(v => String(v).trim())) continue;
        let office = String(row[officeCol] || '').trim();
        if (office && (office.includes('衛生所') || office.includes('區') || OFFICE_CODE_MAP[office.toLowerCase()])) {
            if (!office.includes('衛生所') && office.includes('區')) office += '衛生所';
            currentOffice = office;
        }
        const person = String(row[personCol] || '').trim();
        let amount = safeFloat(row[amountCol]);
        if (amount === 0) amount = safeFloat(row[5]);
        if (amount === 0) amount = safeFloat(row[4]);
        const note = String(row[noteCol] || '').trim();
        if (amount > 0 && currentOffice) {
            for (const sp of splitPersons(person, amount)) {
                records.push({ office: currentOffice, person: sp.name, amount: sp.amount, sheet: sheetName, type: '加班費', reason: note || sheetName });
            }
        }
    }
    return records;
}

function extractOvertimeSummary(sheet, sheetName, fileLabel) {
    const nrows = sheetRows(sheet);
    const records = [];
    let purpose = sheetName;
    for (let r = 0; r < Math.min(nrows, 5); r++) {
        const t = getRow(sheet, r).join('');
        if (t.includes('用途')) { purpose = t.replace(/用途[：:]/, '').trim(); break; }
    }
    let feeType = '加班費';
    if (purpose.includes('差旅') || purpose.includes('旅費')) feeType = '差旅費';
    else if (purpose.includes('誤餐') || purpose.includes('醫護') || purpose.includes('宣導') || purpose.includes('郵簡')) feeType = '其他費用';

    // 智慧偵測欄位
    let officeCol = 1, amountCol = 2, personCol = -1, startRow = 2;
    for (let r = 0; r < Math.min(nrows, 5); r++) {
        const row = getRow(sheet, r);
        const cells = row.map(v => String(v).trim());
        if (cells.some(s => s.includes('鄉鎮') || s.includes('衛生所') || s === '編號')) {
            startRow = r + 1;
            cells.forEach((s, c) => {
                if (s.includes('鄉鎮') || s.includes('衛生所名稱') || s.includes('衛生所')) officeCol = c;
                if (s === '金額' || s === '總計' || (s.includes('金額') && !s.includes('總'))) amountCol = c;
                if (s.includes('領受人')) personCol = c;
            });
            break;
        }
    }

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row)) continue;
        const office = String(row[officeCol] || '').trim();
        const amount = safeFloat(row[amountCol]);
        const person = personCol >= 0 ? String(row[personCol] || '').trim() : '';
        if (amount > 0 && office && isValidOffice(office)) {
            if (person) {
                for (const sp of splitPersons(person, amount)) {
                    records.push({ office, person: sp.name, amount: sp.amount, sheet: sheetName, type: feeType, reason: purpose });
                }
            } else {
                records.push({ office, person: '', amount, sheet: sheetName, type: feeType, reason: purpose });
            }
        }
    }
    return records;
}

function extractTravelDetail(sheet, sheetName, fileLabel) {
    const nrows = sheetRows(sheet);
    const records = [];
    let currentOffice = '';

    const hdr = findHeaderRow(sheet, '領受人');
    const startRow = hdr >= 0 ? hdr + 1 : 6;
    const cols = hdr >= 0 ? detectColumns(sheet, hdr) : {};
    const officeCol = cols.officeCol >= 0 ? cols.officeCol : 1;
    const personCol = cols.personCol >= 0 ? cols.personCol : 2;
    const amountCol = cols.amountCol >= 0 ? cols.amountCol : 5;
    const noteCol = cols.noteCol >= 0 ? cols.noteCol : 7;

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row) || !row.some(v => String(v).trim())) continue;
        let office = String(row[officeCol] || '').trim();
        if (office && (office.includes('衛生所') || office.includes('區') || OFFICE_CODE_MAP[office.toLowerCase()])) {
            if (!office.includes('衛生所') && office.includes('區')) office += '衛生所';
            currentOffice = office;
        }
        const person = String(row[personCol] || '').trim();
        let amount = safeFloat(row[amountCol]);
        if (amount === 0) amount = safeFloat(row[5]);
        if (amount === 0) amount = safeFloat(row[4]);
        const note = String(row[noteCol] || '').trim();
        if (amount > 0 && currentOffice) {
            for (const sp of splitPersons(person, amount)) {
                records.push({ office: currentOffice, person: sp.name, amount: sp.amount, sheet: sheetName, type: '差旅費', reason: note || sheetName });
            }
        }
    }
    return records;
}

function extractTravelTraffic(sheet, sheetName, fileLabel) {
    const nrows = sheetRows(sheet);
    const records = [];
    let startRow = 4;
    for (let r = 0; r < Math.min(nrows, 10); r++) {
        if (getRow(sheet, r).join('').match(/姓.*名/)) { startRow = r + 1; break; }
    }

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row) || !row.some(v => String(v).trim())) continue;
        const person = String(row[0] || '').trim();
        const amount = safeFloat(row[4]);
        let district = String(row[5] || '').trim();
        const note = String(row[7] || '').trim();
        if (amount > 0 && person) {
            const office = district && !district.includes('衛生所') ? district + '衛生所' : district;
            for (const sp of splitPersons(person, amount)) {
                records.push({ office, person: sp.name, amount: sp.amount, sheet: sheetName, type: '差旅費', reason: note || sheetName });
            }
        }
    }
    return records;
}

function extractTravelList(sheet, sheetName, fileLabel) {
    const nrows = sheetRows(sheet);
    const records = [];
    let officeCol = 0, amountCol = 1, noteCol = 2, startRow = 3;

    for (let r = 0; r < Math.min(nrows, 5); r++) {
        const row = getRow(sheet, r);
        const t = row.join('');
        if ((t.includes('衛生所') || t.includes('鄉鎮')) && (t.includes('金額') || t.includes('備註'))) {
            startRow = r + 1;
            row.forEach((v, c) => {
                const s = String(v).trim();
                if (s.includes('衛生所') || s.includes('鄉鎮')) officeCol = c;
                if (s.includes('金額')) amountCol = c;
                if (s.includes('備註')) noteCol = c;
            });
            break;
        }
    }

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row)) continue;
        let officeRaw = String(row[officeCol] || '').trim();
        const amount = safeFloat(row[amountCol]);
        const note = String(row[noteCol] || '').trim();
        if (amount > 0 && officeRaw) {
            let office = officeRaw.replace(/^\d+\.?\s*/, '').trim() || officeRaw;
            if (!office.includes('衛生所') && office.includes('區')) office += '衛生所';
            let person = '';
            if (note) {
                const m = note.match(/\d+\/\d+\s*(.+)/);
                person = m ? m[1].trim() : note;
            }
            for (const sp of splitPersons(person, amount)) {
                records.push({ office, person: sp.name, amount: sp.amount, sheet: sheetName, type: '差旅費', reason: sheetName });
            }
        }
    }
    return records;
}

function extractVoucherDetail(sheet, sheetName, fileLabel) {
    // 傳票格式：姓名在 col0，金額分拆成百萬~元各欄，col10 有小計金額
    const nrows = sheetRows(sheet);
    const records = [];
    let startRow = 8, subtotalCol = 10;

    // 找到有「名 稱」和「金 額」的 header
    for (let r = 0; r < Math.min(nrows, 10); r++) {
        const row = getRow(sheet, r);
        const t = row.join('');
        if (t.includes('小計') || t.includes('小 計')) {
            row.forEach((v, c) => { if (String(v).includes('小計') || String(v).includes('小 計')) subtotalCol = c; });
        }
        if (t.replace(/\s/g, '').includes('名稱') && t.replace(/\s/g, '').includes('金額')) {
            startRow = r + 2; // skip header + sub-header (百萬/十萬...)
            break;
        }
    }

    // 從彙總表標題取得衛生所或用途資訊
    let purpose = sheetName;
    for (let r = 0; r < Math.min(nrows, 8); r++) {
        const t = getRow(sheet, r).join('');
        if (t.includes('明細表')) { purpose = t.replace(/\s/g, '').match(/[^表]+明細表/)?.[0] || sheetName; break; }
    }

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row)) continue;
        const person = String(row[0] || '').trim();
        if (!person) continue;
        // 只取小計欄有值的行（每人小計）
        const amount = safeFloat(row[subtotalCol]);
        if (amount > 0) {
            records.push({ office: '(傳票明細)', person, amount, sheet: sheetName, type: '差旅費', reason: purpose });
        }
    }
    return records;
}

// ===== 主處理 =====
function processFile(file) {
    document.getElementById('progressArea').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';
    const log = document.getElementById('logArea');
    const fill = document.getElementById('progressFill');
    log.innerHTML = '';
    function addLog(msg) { log.innerHTML += msg + '\n'; log.scrollTop = log.scrollHeight; }

    addLog('📤 讀取檔案中...');
    fill.style.width = '20%';

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            addLog('📖 解析 XLS...');
            fill.style.width = '40%';

            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const allRecords = [];

            addLog(`📂 ${file.name} - 共 ${wb.SheetNames.length} 個分頁`);
            fill.style.width = '50%';

            const typeLabels = {
                'overtime_detail': '加班明細', 'overtime_summary': '費用彙整',
                'travel_detail': '差旅明細', 'travel_traffic': '交通差旅',
                'travel_list': '旅費清單', 'voucher_detail': '傳票明細', 'summary': '彙總表'
            };

            wb.SheetNames.forEach((name, idx) => {
                const sheet = wb.Sheets[name];
                const type = detectSheetType(sheet, name, idx);
                if (type === 'empty') return;

                let recs = [];
                if (type === 'overtime_detail') recs = extractOvertimeDetail(sheet, name);
                else if (type === 'overtime_summary') recs = extractOvertimeSummary(sheet, name);
                else if (type === 'travel_detail') recs = extractTravelDetail(sheet, name);
                else if (type === 'travel_traffic') recs = extractTravelTraffic(sheet, name);
                else if (type === 'travel_list') recs = extractTravelList(sheet, name);
                else if (type === 'voucher_detail') recs = extractVoucherDetail(sheet, name);

                allRecords.push(...recs);
                if (recs.length > 0 || type === 'summary')
                    addLog(`   [${idx}] ${name} → ${typeLabels[type] || type} (${recs.length} 筆)`);
            });

            fill.style.width = '80%';

            // 代碼轉換為衛生所名稱 (z20 → 佳里區衛生所)
            allRecords.forEach(r => {
                r.office = resolveOffice(r.office);
                r.sheet = cleanSheetName(r.sheet);
                r.person = cleanPersonName(r.person);
                r.reason = cleanSheetName(r.reason);
            });

            // 過濾無效衛生所名稱
            const validRecords = allRecords.filter(r => isValidOffice(r.office));

            // 個人小計：有姓名的合併，無姓名的逐筆列出
            const personMap = {};
            const unknownList = [];
            validRecords.forEach(r => {
                if (r.person) {
                    const key = r.office + '|' + r.person;
                    if (!personMap[key]) personMap[key] = { office: r.office, person: r.person, travelCount: 0 };
                    personMap[key][r.type] = (personMap[key][r.type] || 0) + r.amount;
                    if (r.type === '差旅費') personMap[key].travelCount++;
                } else {
                    unknownList.push({ office: r.office, person: `(${r.sheet})`, travelCount: r.type === '差旅費' ? 1 : 0, [r.type]: r.amount, _unknown: true });
                }
            });
            const personList = [...Object.values(personMap), ...unknownList].sort((a, b) => a.office.localeCompare(b.office));

            // 衛生所清單
            const offices = [...new Set(validRecords.map(r => r.office))].filter(isValidOffice).sort();
            const overtimeCount = validRecords.filter(r => r.type === '加班費').length;
            const grandTotal = validRecords.reduce((s, r) => s + r.amount, 0);

            addLog(`\n📊 共 ${validRecords.length} 筆明細（姓名已拆分）`);
            addLog(`🏥 衛生所: ${offices.length} 個`);
            addLog(`👤 不重複人員: ${personList.length} 人`);
            addLog('✅ 處理完成！');
            fill.style.width = '100%';

            resultData = {
                allRecords: validRecords,
                offices,
                personList,
                overtimeCount,
                grandTotal,
                personCount: personList.length,
                fileName: file.name.replace(/\.xlsx?$/i, ''),
                fileTitle: extractFileTitle(file.name),
                wb  // 保留原始 workbook 供下載用
            };

            showResult();

        } catch (err) {
            addLog('❌ 錯誤: ' + err.message);
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(file);
}

// ===== 顯示結果 =====
function showResult() {
    const r = resultData;
    document.getElementById('resultArea').style.display = 'block';

    document.getElementById('resultSummary').innerHTML = `
        <div class="stat-card"><div class="number">${r.allRecords.length}</div><div class="label">全部明細筆數</div></div>
        <div class="stat-card"><div class="number">${r.offices.length}</div><div class="label">衛生所數</div></div>
        <div class="stat-card"><div class="number">${r.overtimeCount}</div><div class="label">加班費筆數</div></div>
        <div class="stat-card"><div class="number">${r.personCount}</div><div class="label">不重複人員</div></div>
        <div class="stat-card"><div class="number">${r.grandTotal.toLocaleString()}</div><div class="label">全部總金額</div></div>
    `;

    const sel = document.getElementById('officeSelect');
    sel.innerHTML = '<option value="">-- 全部衛生所 --</option>';
    r.offices.forEach(o => { sel.innerHTML += `<option value="${o}">${o}</option>`; });

    // 預設選擇佳里區衛生所
    const defaultOffice = r.offices.find(o => o.includes('佳里'));
    if (defaultOffice) sel.value = defaultOffice;

    filterByOffice();
}

function filterByOffice() {
    if (!resultData) return;
    const office = document.getElementById('officeSelect').value;
    const records = office ? resultData.allRecords.filter(r => r.office === office) : resultData.allRecords;
    const total = records.reduce((s, r) => s + r.amount, 0);

    // 資訊列
    if (office) {
        document.getElementById('selectedInfo').style.display = 'block';
        document.getElementById('selectedInfo').innerHTML =
            `<strong>${office}</strong>　共 <strong>${records.length}</strong> 筆，合計 <strong>${total.toLocaleString()}</strong> 元`;
    } else {
        document.getElementById('selectedInfo').style.display = 'none';
    }

    // 明細表
    document.getElementById('detailCard').style.display = 'block';
    document.getElementById('detailTitle').textContent = office ? `📋 ${office} 出差明細` : '📋 全部出差明細';

    const officeCol = office ? '' : '<th>衛生所</th>';
    const colSpan = office ? 3 : 4;
    let rows = records.map(r => `<tr>${office ? '' : `<td>${r.office}</td>`}<td>${r.sheet}</td><td>${r.type}</td><td>${r.person}</td><td class="text-right">${r.amount.toLocaleString()}</td><td>${r.reason}</td></tr>`).join('');
    document.getElementById('officeTable').innerHTML = `
        <table><tr>${officeCol}<th>分頁</th><th>類型</th><th>姓名</th><th>金額</th><th>事由</th></tr>
        ${rows}
        <tr class="total-row"><td colspan="${colSpan}" class="text-right">合計</td><td class="text-right">${total.toLocaleString()}</td><td></td></tr></table>`;

    // 個人小計
    renderPersonTable(office);
}

function renderPersonTable(filterOffice) {
    if (!resultData) return;
    let data = filterOffice ? resultData.personList.filter(p => p.office === filterOffice) : resultData.personList;

    document.getElementById('personCard').style.display = 'block';
    document.getElementById('personTitle').textContent = filterOffice ? `👤 ${filterOffice} 個人小計` : '👤 全部個人小計';

    const feeTypes = ['差旅費', '加班費', '其他費用'];
    let gt = {};
    feeTypes.forEach(t => gt[t] = 0);

    const officeCol = filterOffice ? '' : '<th>衛生所</th>';
    let totalTravelCount = 0;
    let prows = data.map(p => {
        let rowTotal = 0;
        let cells = '';
        feeTypes.forEach(t => {
            const v = p[t] || 0;
            gt[t] += v;
            rowTotal += v;
            cells += `<td class="text-right">${v ? v.toLocaleString() : '-'}</td>`;
        });
        const tc = p.travelCount || 0;
        totalTravelCount += tc;
        return `<tr>${filterOffice ? '' : `<td>${p.office}</td>`}<td>${p.person}</td><td class="text-right">${tc || '-'}</td>${cells}<td class="text-right">${rowTotal.toLocaleString()}</td></tr>`;
    }).join('');

    let grandTotal = Object.values(gt).reduce((s, v) => s + v, 0);
    let gtCells = feeTypes.map(t => `<td class="text-right">${gt[t].toLocaleString()}</td>`).join('');

    document.getElementById('personDetail').innerHTML = `
        <table><tr>${officeCol}<th>姓名</th><th>差旅單</th>${feeTypes.map(t => `<th>${t}</th>`).join('')}<th>總計</th></tr>
        ${prows}
        <tr class="total-row">${filterOffice ? '' : '<td></td>'}<td>總計 (${data.length} 人)</td><td class="text-right">${totalTravelCount}</td>${gtCells}<td class="text-right">${grandTotal.toLocaleString()}</td></tr></table>`;
}

// ===== 下載 Excel =====
function downloadExcel() {
    if (!resultData) return;
    const office = document.getElementById('officeSelect').value;
    const records = office ? resultData.allRecords.filter(r => r.office === office) : resultData.allRecords;
    const feeTypes = ['差旅費', '加班費', '其他費用'];
    const personData = office ? resultData.personList.filter(p => p.office === office) : resultData.personList;
    const otRecords = records.filter(r => r.type === '加班費');

    const wb = XLSX.utils.book_new();
    const data = [];

    // === 區塊1: 全部明細 ===
    const title = resultData.fileTitle + (office ? ` ${office}` : '');
    data.push([title]);
    data.push(['分頁', '類型', '姓名', '金額', '事由']);
    records.forEach(r => data.push([r.sheet, r.type, r.person, r.amount, r.reason]));
    data.push(['', '', '合計', records.reduce((s, r) => s + r.amount, 0), '']);
    data.push([]);

    // === 區塊2: 個人小計 ===
    data.push(['個人小計']);
    data.push(['姓名', '差旅單', ...feeTypes, '總計']);
    personData.forEach(p => {
        const vals = feeTypes.map(t => p[t] || 0);
        data.push([p.person, p.travelCount || 0, ...vals, vals.reduce((s, v) => s + v, 0)]);
    });
    data.push([]);

    // === 區塊3: 加班費彙整 ===
    if (otRecords.length > 0) {
        data.push(['加班費彙整']);
        data.push(['分頁', '姓名', '金額', '事由']);
        otRecords.forEach(r => data.push([r.sheet, r.person, r.amount, r.reason]));
        data.push(['', '合計', otRecords.reduce((s, r) => s + r.amount, 0), '']);
    }

    data.push([]);
    data.push([]);
    data.push(['製表人：']);

    const ws = XLSX.utils.aoa_to_sheet(data);

    // A4 直式列印設定
    ws['!cols'] = [
        { wch: 18 }, // A: 分頁/姓名
        { wch: 10 }, // B: 類型/差旅費
        { wch: 10 }, // C: 姓名/加班費
        { wch: 10 }, // D: 金額/誤餐費
        { wch: 18 }, // E: 事由/醫護費用
        { wch: 10 }  // F: 總計
    ];
    ws['!print'] = { orientation: 'portrait', paper: 9 }; // A4=9
    ws['!margins'] = { left: 0.5, right: 0.5, top: 0.5, bottom: 0.5, header: 0.3, footer: 0.3 };

    XLSX.utils.book_append_sheet(wb, ws, (office || '整理總表').substring(0, 31));

    const fileName = `${resultData.fileName}_整理總表.xlsx`;
    XLSX.writeFile(wb, fileName);
}
