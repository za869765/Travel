<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>差旅明細整理系統 v6.7.1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <style>
        /* ===== Ledger Modern Design System v1.0 ===== */
        :root {
            /* ink — paper & ink 中性色階 */
            --ink-0: oklch(0.985 0.002 240);
            --ink-1: oklch(0.965 0.003 240);
            --ink-2: oklch(0.92  0.004 240);
            --ink-3: oklch(0.82  0.005 240);
            --ink-4: oklch(0.62  0.006 240);
            --ink-5: oklch(0.42  0.007 240);
            --ink-6: oklch(0.25  0.008 240);
            --ink-7: oklch(0.15  0.01  240);
            /* accent — Inkwell Blue */
            --accent-soft: oklch(0.95 0.02 255);
            --accent:      oklch(0.42 0.12 255);
            --accent-deep: oklch(0.32 0.10 255);
            /* semantic — 對帳三態 */
            --ok:        oklch(0.52 0.12 155);
            --warn:      oklch(0.65 0.14 75);
            --fail:      oklch(0.52 0.18 25);
            --ok-soft:   oklch(0.96 0.03 155);
            --warn-soft: oklch(0.97 0.04 75);
            --fail-soft: oklch(0.97 0.04 25);
            /* fonts */
            --font-ui:      "Inter Tight", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
            --font-num:     "JetBrains Mono", "SF Mono", Menlo, ui-monospace, monospace;
            --font-display: "Inter Tight", "PingFang TC", "Microsoft JhengHei", sans-serif;
            /* spacing */
            --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
            --sp-5: 24px; --sp-6: 32px; --sp-7: 48px; --sp-8: 72px;
            /* radius & lines */
            --r-1: 2px; --r-2: 4px;
            --line-hair: 1px; --line-rule: 1px; --line-heavy: 2px;
            /* widths */
            --w-narrow: 720px; --w-default: 1040px; --w-ledger: 1280px; --w-wide: 1440px;
            /* motion */
            --dur-instant: 80ms;
            --dur-fast:   140ms;
            --dur-base:   220ms;
            --dur-slow:   360ms;
            --dur-xslow:  680ms;
            --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
            --ease-in:     cubic-bezier(0.5,  0, 0.75, 0);
            --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
            --ease-emph:   cubic-bezier(0.2,  0, 0,    1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-ui);
            font-size: 15px;
            line-height: 22px;
            color: var(--ink-5);
            background: var(--ink-0);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Tabular numerals ===== */
        .num {
            font-family: var(--font-num);
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1, "zero" 1;
        }

        /* ===== Layout ===== */
        .container { max-width: var(--w-ledger); margin: 0 auto; padding: 0 clamp(16px, 4vw, 40px); }

        /* ===== Header Bar ===== */
        .app-header {
            padding: var(--sp-7) 0 var(--sp-5);
            border-bottom: 2px solid var(--ink-3);
            margin-bottom: var(--sp-6);
        }
        .app-header-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: var(--sp-4);
            margin-bottom: var(--sp-3);
        }
        .app-header h1 {
            font-family: var(--font-display);
            font-size: 40px;
            line-height: 44px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--ink-7);
        }
        .app-version {
            font-family: var(--font-num);
            font-size: 13px;
            color: var(--ink-4);
            letter-spacing: 0;
        }
        .app-flow {
            font-size: 13px;
            color: var(--ink-4);
            letter-spacing: 0;
        }
        .app-flow .sep { margin: 0 var(--sp-2); color: var(--ink-3); }
        .app-disclaim {
            font-size: 11px;
            color: var(--fail);
            margin-top: var(--sp-2);
            letter-spacing: 0.03em;
        }

        /* ===== Section Card ===== */
        .section {
            background: var(--ink-0);
            border: 1px solid var(--ink-2);
            border-radius: var(--r-2);
            margin-bottom: var(--sp-7);
            overflow: hidden;
            animation: led-rise var(--dur-base) var(--ease-out) both;
        }
        .section-header {
            padding: var(--sp-4) var(--sp-5) var(--sp-3);
            border-bottom: 1px solid var(--ink-2);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: var(--sp-4);
        }
        .section-title {
            display: flex;
            align-items: baseline;
            gap: var(--sp-3);
            font-size: 20px;
            line-height: 26px;
            font-weight: 600;
            color: var(--ink-7);
            letter-spacing: -0.01em;
        }
        .section-index {
            font-family: var(--font-num);
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-4);
        }
        .section-meta {
            font-size: 13px;
            color: var(--ink-4);
        }
        .section-meta .dot { margin: 0 var(--sp-2); color: var(--ink-3); }
        .section-body { padding: var(--sp-5); }

        /* ===== Dropzone ===== */
        .dropzone {
            border: 1.5px dashed var(--ink-3);
            border-radius: var(--r-2);
            padding: var(--sp-7) var(--sp-5);
            text-align: center;
            cursor: pointer;
            transition:
                border-color var(--dur-fast) var(--ease-out),
                border-width var(--dur-fast) var(--ease-out),
                background   var(--dur-fast) var(--ease-out);
        }
        .dropzone:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
        }
        .dropzone.dragover {
            border-color: var(--accent-deep);
            border-width: 2px;
            background: var(--accent-soft);
        }
        .dropzone .dz-primary {
            font-size: 16px;
            color: var(--ink-6);
            margin-bottom: var(--sp-2);
        }
        .dropzone .dz-hint {
            font-size: 13px;
            color: var(--ink-4);
        }
        #fileInput { display: none; }

        /* ===== File Row ===== */
        .file-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--sp-4);
            padding: var(--sp-3) 0;
            margin-top: var(--sp-4);
            border-top: 1px solid var(--ink-2);
        }
        .file-row .file-name {
            font-family: var(--font-num);
            font-size: 14px;
            color: var(--ink-6);
            word-break: break-all;
        }
        .file-row .file-name .prefix {
            color: var(--ink-4);
            margin-right: var(--sp-2);
        }
        .file-row .file-size {
            font-family: var(--font-num);
            font-size: 13px;
            color: var(--ink-4);
            white-space: nowrap;
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--sp-2);
            height: 36px;
            padding: 0 var(--sp-4);
            border-radius: var(--r-1);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.005em;
            cursor: pointer;
            border: 1px solid transparent;
            transition:
                background var(--dur-fast) var(--ease-out),
                color      var(--dur-fast) var(--ease-out),
                border     var(--dur-fast) var(--ease-out),
                transform  var(--dur-instant) var(--ease-out);
        }
        .btn:active { transform: translateY(1px); }
        .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .btn-primary {
            background: var(--accent);
            color: var(--ink-0);
        }
        .btn-primary:hover { background: var(--accent-deep); }
        .btn-secondary {
            background: var(--ink-0);
            color: var(--ink-6);
            border-color: var(--ink-3);
        }
        .btn-secondary:hover { background: var(--ink-1); }
        .btn-ghost {
            background: transparent;
            color: var(--accent);
        }
        .btn-ghost:hover { background: var(--accent-soft); }
        .btn-group {
            display: flex;
            gap: var(--sp-3);
            margin-top: var(--sp-5);
            flex-wrap: wrap;
        }

        /* ===== Progress & Log ===== */
        .progress-area { display: none; }
        .progress-track {
            height: 4px;
            background: var(--ink-2);
            overflow: hidden;
            margin-bottom: var(--sp-3);
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background:
                linear-gradient(90deg,
                    var(--accent) 0%,
                    var(--accent) 40%,
                    color-mix(in oklch, var(--accent) 70%, white) 50%,
                    var(--accent) 60%,
                    var(--accent) 100%);
            background-size: 200% 100%;
            animation: led-shimmer 1400ms linear infinite;
            transition: width var(--dur-slow) var(--ease-out);
        }
        .progress-fill.done { animation: none; }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--ink-4);
            margin-bottom: var(--sp-3);
        }
        .progress-meta .pct { font-family: var(--font-num); color: var(--ink-6); }
        .log {
            background: var(--ink-1);
            border-radius: var(--r-1);
            padding: var(--sp-3);
            font-family: var(--font-num);
            font-size: 13px;
            line-height: 18px;
            color: var(--ink-5);
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* ===== Stat Bar ===== */
        .stat-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border-top: 1px solid var(--ink-2);
        }
        .stat-bar.has-unknown {
            grid-template-columns: repeat(6, 1fr);
        }
        .stat-col {
            padding: var(--sp-5) var(--sp-4);
            border-right: 1px solid var(--ink-2);
        }
        .stat-col:last-child { border-right: 0; }
        .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--ink-4);
            margin-bottom: var(--sp-2);
        }
        .stat-value {
            font-family: var(--font-num);
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1, "zero" 1;
            font-size: 36px;
            line-height: 40px;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--ink-7);
            margin-bottom: var(--sp-1);
        }
        .stat-col.fail .stat-value,
        .stat-col.fail .stat-label { color: var(--fail); }
        .stat-unit {
            font-size: 12px;
            font-weight: 400;
            color: var(--ink-4);
        }
        @media (max-width: 768px) {
            .stat-bar,
            .stat-bar.has-unknown {
                grid-template-columns: repeat(2, 1fr);
            }
            .stat-col {
                border-bottom: 1px solid var(--ink-2);
            }
            .stat-col:nth-last-child(-n+2) { border-bottom: 0; }
        }

        /* ===== Select ===== */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: var(--sp-3);
            flex-wrap: wrap;
        }
        .filter-bar label {
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-4);
        }
        .select {
            height: 40px;
            padding: 0 var(--sp-3);
            font-family: var(--font-ui);
            font-size: 15px;
            color: var(--ink-6);
            background: var(--ink-0);
            border: 1px solid var(--ink-3);
            border-radius: var(--r-1);
            min-width: 240px;
            cursor: pointer;
            transition: border var(--dur-fast) var(--ease-out);
        }
        .select:hover { border-color: var(--ink-4); }
        .select:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: -1px;
            border-color: var(--accent);
        }

        /* ===== Selected Info ===== */
        .selected-info {
            margin-top: var(--sp-4);
            padding: var(--sp-3) var(--sp-4);
            background: var(--ink-1);
            border-left: 3px solid var(--accent);
            font-size: 14px;
            color: var(--ink-6);
        }
        .selected-info strong { color: var(--ink-7); font-weight: 600; }
        .selected-info .recon-ok { color: var(--ok); font-weight: 500; }
        .selected-info .recon-fail { color: var(--fail); font-weight: 500; }

        /* ===== Table — Ledger Style ===== */
        .table-wrap {
            max-height: 480px;
            overflow: auto;
            border: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: var(--ink-0);
            padding: var(--sp-3) var(--sp-3);
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-6);
            text-align: left;
            border-bottom: 2px solid var(--ink-6);
            white-space: nowrap;
        }
        thead th.num-col { text-align: right; }
        tbody td {
            padding: var(--sp-2) var(--sp-3);
            border-bottom: 1px solid var(--ink-2);
            color: var(--ink-6);
            vertical-align: middle;
        }
        tbody td.num-cell {
            font-family: var(--font-num);
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1, "zero" 1;
            text-align: right;
            white-space: nowrap;
        }
        tbody td.date-cell,
        tbody td.id-cell {
            font-family: var(--font-num);
        }
        tbody tr:nth-child(even) { background: var(--ink-1); }
        tbody tr:hover { background: var(--accent-soft); }
        tbody tr.subtotal td {
            border-top: 1px solid var(--ink-3);
            font-weight: 500;
            color: var(--ink-7);
        }
        tbody tr.grand-total td {
            border-top: 3px double var(--ink-6);
            border-bottom: 2px solid var(--ink-6);
            padding-top: var(--sp-3);
            padding-bottom: var(--sp-3);
            font-size: 15px;
            font-weight: 600;
            color: var(--ink-7);
            background: var(--ink-0);
            animation: led-stamp var(--dur-xslow) var(--ease-out) 200ms both;
        }

        /* ===== Recon Badges ===== */
        .badge-recon {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 20px;
            padding: 0 6px;
            border-radius: var(--r-1);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.04em;
            animation: led-pop var(--dur-base) var(--ease-out) both;
        }
        .badge-recon .mark {
            font-size: 10px;
            line-height: 1;
        }
        .badge-recon.ok { background: var(--ok-soft); color: var(--ok); }
        .badge-recon.warn { background: var(--warn-soft); color: var(--warn); }
        .badge-recon.fail { background: var(--fail-soft); color: var(--fail); }

        /* ===== Modal ===== */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.32);
            backdrop-filter: blur(2px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            animation: led-fade var(--dur-base) var(--ease-out) both;
        }
        .modal-backdrop.show { display: flex; }
        .modal {
            background: var(--ink-0);
            border: 1px solid var(--ink-2);
            border-radius: var(--r-2);
            padding: var(--sp-6);
            max-width: 480px;
            width: 90%;
            animation: led-rise var(--dur-base) var(--ease-emph) both;
        }
        .modal h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--ink-7);
            letter-spacing: -0.01em;
            margin-bottom: var(--sp-4);
        }
        .modal .modal-file {
            font-family: var(--font-num);
            font-size: 13px;
            color: var(--ink-6);
            background: var(--ink-1);
            padding: var(--sp-2) var(--sp-3);
            border-left: 2px solid var(--ink-3);
            margin-bottom: var(--sp-4);
            word-break: break-all;
        }
        .modal .modal-causes {
            font-size: 14px;
            color: var(--ink-5);
            margin-bottom: var(--sp-5);
        }
        .modal .modal-causes li {
            list-style: none;
            padding: var(--sp-1) 0;
        }
        .modal .modal-causes li::before {
            content: "— ";
            color: var(--ink-4);
        }
        .modal .btn-group { margin-top: 0; justify-content: flex-end; }

        /* ===== Row stagger (tbody tr --i) ===== */
        tbody tr {
            animation: led-rise var(--dur-base) var(--ease-out) both;
            animation-delay: calc(var(--i, 0) * 24ms);
        }
        tbody tr.just-shown {
            animation: led-row-flash 900ms var(--ease-out);
        }

        /* ===== Tally underline (對帳通過,金額格下劃綠線) ===== */
        .amount-ok {
            position: relative;
        }
        .amount-ok::after {
            content: "";
            position: absolute;
            left: var(--sp-3); right: var(--sp-3); bottom: 2px;
            height: 1px;
            background: var(--ok);
            transform-origin: left;
            animation: led-tally var(--dur-slow) var(--ease-out) calc(200ms + var(--i, 0) * 24ms) both;
        }

        /* ===== Log caret blink ===== */
        .log-caret {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: var(--accent);
            vertical-align: text-bottom;
            margin-left: 2px;
            animation: led-blink 1s steps(1, end) infinite;
        }
        .log {
            mask-image: linear-gradient(to bottom, transparent 0, black 24px);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0, black 24px);
        }
        .log-line {
            animation: led-rise var(--dur-base) var(--ease-out) both;
        }

        /* ===== Warn/fail badge pulse ===== */
        .badge-recon.warn,
        .badge-recon.fail {
            animation:
                led-pop var(--dur-base) var(--ease-out) both,
                led-pulse 1800ms var(--ease-in-out) 600ms 3;
        }

        /* ===== Count-up stat value — 數字滾動效果由 JS 觸發 ===== */
        .stat-value { will-change: auto; }
        .stat-col {
            position: relative;
            overflow: hidden;
        }
        .stat-col.counting::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(90deg, transparent 0%, var(--accent-soft) 50%, transparent 100%);
            animation: led-scan 900ms var(--ease-out);
            pointer-events: none;
        }

        /* ===== Accordion (fileInfo 展開用) ===== */
        .file-expand {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows var(--dur-base) var(--ease-emph);
        }
        .file-expand > div { overflow: hidden; }
        .file-row.open + .file-expand { grid-template-rows: 1fr; }

        /* ===== Person row grouping (同一人) ===== */
        tbody tr.group-last td { border-bottom: 1px solid var(--ink-3); }
        .dash-soft { color: var(--ink-3); }

        /* ===== Section kicker accent (微強調,打破全黑白) ===== */
        .section-header {
            position: relative;
        }
        .section-header::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--accent);
            transform: scaleY(0);
            transform-origin: top;
            animation: led-tally var(--dur-slow) var(--ease-out) 200ms forwards;
        }

        /* ===== Total金額強調(不違反 ink-6 規則,靠粗細+大小) ===== */
        .stat-col:last-child .stat-value { color: var(--ink-7); }

        /* ===== Keyframes ===== */
        @keyframes led-rise {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0);   }
        }
        @keyframes led-fade {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes led-pop {
            0%   { opacity: 0; transform: scale(0.88); }
            60%  { opacity: 1; transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1);    }
        }
        @keyframes led-pulse {
            0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
            50%      { box-shadow: 0 0 0 4px transparent; opacity: 0.65; }
        }
        @keyframes led-shimmer {
            from { background-position: -200% 0; }
            to   { background-position:  200% 0; }
        }
        @keyframes led-stamp {
            0%   { opacity: 0; transform: scale(1.06); letter-spacing: 0.06em; }
            60%  { opacity: 1; transform: scale(1.01); letter-spacing: 0;      }
            100% { opacity: 1; transform: scale(1);    letter-spacing: -0.005em;}
        }
        @keyframes led-row-flash {
            0%   { background-color: var(--accent-soft); }
            100% { background-color: transparent; }
        }
        @keyframes led-tally {
            from { transform: scaleX(0); }
            to   { transform: scaleX(1); }
        }
        @keyframes led-blink {
            0%, 49%   { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        @keyframes led-scan {
            0%   { opacity: 0; transform: translateX(-100%); }
            20%  { opacity: 0.8; }
            100% { opacity: 0; transform: translateX(100%); }
        }
        @keyframes led-expand {
            from { grid-template-rows: 0fr; opacity: 0; }
            to   { grid-template-rows: 1fr; opacity: 1; }
        }

        /* stagger */
        .section:nth-child(1) { animation-delay:  40ms; }
        .section:nth-child(2) { animation-delay: 120ms; }
        .section:nth-child(3) { animation-delay: 200ms; }
        .section:nth-child(4) { animation-delay: 280ms; }
        .section:nth-child(5) { animation-delay: 360ms; }

        /* reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* ===== Print ===== */
        @page { size: A4 portrait; margin: 12mm; }
        @media print {
            body { background: white; }
            .app-header, .section { border-color: black; }
            .dropzone, .progress-area, .btn-group, .filter-bar { display: none !important; }
            tbody tr.grand-total td { border-top: 2.25pt double black; }
        }
    </style>
</head>
<body>

<script>
// ===== 全域變數 =====
let resultData = null;

// ===== LiveNum count-up 模組 =====
const LiveNum = (function(){
    const ease = t => 1 - Math.pow(1-t, 3);
    function countUp(el, target, opts){
        if(!el) return;
        const prefersReduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
        const dur = (opts && opts.duration) || 680;
        const prefix = (opts && opts.prefix) || '';
        const start = parseFloat(String(el.textContent || '').replace(/[,$%\s]/g,'')) || 0;
        const tgt = Number(target) || 0;
        if (prefersReduce || start === tgt) {
            el.textContent = prefix + tgt.toLocaleString();
            return;
        }
        const col = el.closest('.stat-col');
        if (col) {
            col.classList.add('counting');
            setTimeout(() => col.classList.remove('counting'), 900);
        }
        const t0 = performance.now();
        function step(now){
            const t = Math.min(1, (now - t0) / dur);
            const v = start + (tgt - start) * ease(t);
            el.textContent = prefix + Math.round(v).toLocaleString();
            if (t < 1) requestAnimationFrame(step);
            else el.textContent = prefix + tgt.toLocaleString();
        }
        requestAnimationFrame(step);
    }
    return { countUp };
})();

// ===== 表格列 stagger 索引寫入 =====
function applyRowStagger(containerEl, maxStagger = 20) {
    if (!containerEl) return;
    const rows = containerEl.querySelectorAll('tbody tr');
    rows.forEach((tr, i) => {
        tr.style.setProperty('--i', i < maxStagger ? i : maxStagger);
    });
}

// ===== 衛生所代碼對照表 =====
const OFFICE_CODE_MAP = {
    'z01':'仁德區衛生所','z02':'歸仁鄉衛生所','z03':'關廟區衛生所','z04':'龍崎區衛生所',
    'z05':'永康區衛生所','z06':'新化區衛生所','z07':'善化區衛生所','z08':'新市區衛生所',
    'z09':'安定區衛生所','z10':'山上區衛生所','z11':'玉井區衛生所','z12':'楠西區衛生所',
    'z13':'南化區衛生所','z14':'左鎮區衛生所','z15':'麻豆區衛生所','z16':'下營區衛生所',
    'z17':'六甲區衛生所','z18':'官田區衛生所','z19':'大內區衛生所','z20':'佳里區衛生所',
    'z21':'西港區衛生所','z22':'七股區衛生所','z23':'將軍區衛生所','z24':'北門區衛生所',
    'z25':'學甲區衛生所','z26':'新營區衛生所','z27':'鹽水區衛生所','z28':'白河區衛生所',
    'z29':'柳營區衛生所','z30':'後壁區衛生所','z31':'東山區衛生所','z32':'東區衛生所',
    'z33':'南區衛生所','z34':'中西區衛生所','z35':'北區衛生所','z36':'安南區衛生所',
    'z37':'安平區衛生所'
};
// 反向查詢表：區名→完整衛生所名（啟動時建立）
const OFFICE_NAME_MAP = {};
// 排序用：衛生所名→順序索引；顯示用：衛生所名→Z代碼
const OFFICE_ORDER = {};
const OFFICE_CODE_REVERSE = {};
(function() {
    Object.entries(OFFICE_CODE_MAP).forEach(([code, full], idx) => {
        const m = full.match(/([\u4e00-\u9fff]+[區鄉市])衛生所/);
        if (m) {
            OFFICE_NAME_MAP[m[1]] = full;                     // 佳里區→佳里區衛生所
            OFFICE_NAME_MAP[m[1].replace(/[區鄉市]$/, '')] = full; // 佳里→佳里區衛生所
        }
        OFFICE_NAME_MAP[full] = full;
        OFFICE_ORDER[full] = idx;
        OFFICE_CODE_REVERSE[full] = code.toUpperCase();
    });
})();

function resolveOffice(name) {
    if (!name) return name;
    // 去除所有空格（含全形空格 \u3000、不斷行空格 \u00a0 等）
    let clean = name.replace(/[\s\u3000\u00a0]+/g, '');
    // z-code 對照
    const key = clean.toLowerCase();
    if (OFFICE_CODE_MAP[key]) return OFFICE_CODE_MAP[key];
    // 完整名稱 / 少「衛生所」/ 少「區」智慧匹配
    if (OFFICE_NAME_MAP[clean]) return OFFICE_NAME_MAP[clean];
    // 去掉「衛生所」後再試（佳里衛生所→佳里→佳里區衛生所）
    const noSuffix = clean.replace(/衛生所$/, '');
    if (noSuffix !== clean && OFFICE_NAME_MAP[noSuffix]) return OFFICE_NAME_MAP[noSuffix];
    // 去掉「區衛生所」後再試
    const noDistSuffix = clean.replace(/[區鄉市]?衛生所$/, '');
    if (noDistSuffix !== clean && OFFICE_NAME_MAP[noDistSuffix]) return OFFICE_NAME_MAP[noDistSuffix];
    // 含衛生所則回傳清理版
    if (clean.includes('衛生所')) return clean;
    // 最後嘗試純地名
    if (OFFICE_NAME_MAP[clean]) return OFFICE_NAME_MAP[clean];
    return name.trim();
}

// ===== 上傳處理 =====
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});
document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

function handleFile(file) {
    if (!file.name.match(/\.(xlsx?|csv)$/i)) { alert('請上傳 .xls / .xlsx / .csv 格式檔案'); return; }

    // 顯示檔案資訊
    document.getElementById('fileInfo').style.display = 'block';
    document.getElementById('fileInfo').className = 'file-row';
    document.getElementById('fileInfo').innerHTML = `
        <span class="file-name"><span class="prefix">▸</span>${file.name}</span>
        <span class="file-size">${(file.size / 1024).toFixed(1)} KB</span>
    `;

    // 直接開始處理
    processFile(file);
}

function resetPage() {
    resultData = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('fileInfo').style.display = 'none';
    document.getElementById('progressArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('uploadCard').style.display = 'block';
}

// ===== 從檔名提取標題 =====
function extractFileTitle(filename) {
    const name = filename.replace(/\.(xlsx?|csv)$/i, '');
    // 格式1: "79,054元115年衛生所第3次旅費彙整表 (1)" → "115年衛生所第3次旅費"
    let m = name.match(/[\d,]+元(\d+年衛生所第\d+次[^\s(（]+)/);
    if (m) return m[1].replace(/彙整表$/, '').replace(/員整表$/, '');
    // 格式2: "衛生所代辦經費彙整表1140312" → 原樣
    m = name.match(/(衛生所[^\s(（]+)/);
    if (m) return m[1];
    // 格式3: "114年衛生所第4次差旅費彙整表 (1)" → "114年衛生所第4次差旅費"
    m = name.match(/(\d+年衛生所第\d+次[^\s(（]+)/);
    if (m) return m[1].replace(/彙整表$/, '').replace(/員整表$/, '');
    return name.replace(/\s*[\(（]\d+[\)）]\s*$/, '');
}

// ===== 姓名拆分 =====
function cleanPersonName(s) {
    if (!s) return '';
    s = s.trim();
    // 提取純中文姓名（2~4字中文）
    const m = s.match(/([\u4e00-\u9fff]{2,4})/);
    return m ? m[1] : '';
}

function splitPersons(personStr, totalAmount) {
    if (!personStr || !personStr.trim()) return [{ name: '', amount: totalAmount }];
    // v6.6.3 智慧辨識：支援多種人名+金額格式，嚴格遵守「人名不遺漏、找不到則留空給使用者補」
    let text = personStr.trim();

    // (1) 先正規化金額：把 $ 後面的千分位 , 與 "元" 字拿掉，避免 , 被當人名分隔符、元 吃掉匹配
    text = text.replace(/\$\s*(\d{1,3}(?:,\d{3})+(?:\.\d+)?)\s*元?/g, (_, n) => '$' + n.replace(/,/g, ''));
    text = text.replace(/\$\s*(\d+(?:\.\d+)?)\s*元/g, (_, n) => '$' + n);

    // (2) 多種分隔符拆分：+ ＋ 、 , ， / ・ & 及 和 兼（中文「及/和/兼」前後允許空白）
    const parts = text.split(/[+＋、,，/・&]|\s*(?:及|和|兼)\s*/);
    let results = [];

    for (let part of parts) {
        part = part.trim();
        if (!part) continue;

        let m;

        // (A) 姓名$金額*N人 — 展開 N 筆（第 1 筆帶姓名，其餘留空給使用者補），避免另 N-1 人金額消失
        m = part.match(/^(.+?)\s*\$\s*(\d+(?:\.\d+)?)\s*\*\s*(\d+)\s*人?$/);
        if (m) {
            const perAmt = parseFloat(m[2]);
            const n = parseInt(m[3], 10) || 1;
            results.push({ name: m[1].trim(), amount: perAmt });
            for (let i = 1; i < n; i++) results.push({ name: '', amount: perAmt });
            if (typeof addLog === 'function') addLog(`"${part}" 展開為 ${n} 筆（${n-1} 筆姓名留空待補）`);
            continue;
        }

        // (B) 姓名$金額 / 姓名 $ 金額
        m = part.match(/^(.+?)\s*\$\s*(\d+(?:\.\d+)?)$/);
        if (m) { results.push({ name: m[1].trim(), amount: parseFloat(m[2]) }); continue; }

        // (C) 智慧：中文姓名後直接接數字（無 $）— "鍾宜珍157" / "鍾宜珍 157"
        m = part.match(/^([\u4e00-\u9fff]{2,4})\s*(\d+(?:\.\d+)?)$/);
        if (m) { results.push({ name: m[1].trim(), amount: parseFloat(m[2]) }); continue; }

        // (D) 智慧：數字開頭 + 姓名 — "157鍾宜珍"
        m = part.match(/^(\d+(?:\.\d+)?)\s*([\u4e00-\u9fff]{2,4})$/);
        if (m) { results.push({ name: m[2].trim(), amount: parseFloat(m[1]) }); continue; }

        // (E) 純數字（有金額但無姓名）— 姓名留空給使用者補
        m = part.match(/^\$?\s*(\d+(?:\.\d+)?)$/);
        if (m) { results.push({ name: '', amount: parseFloat(m[1]) }); continue; }

        // (F) 其他（純姓名或含噪音前後綴）— line 988 的 cleanPersonName 會再次清理
        results.push({ name: part, amount: 0 });
    }

    // 只有單一筆且無金額 → 把整個 totalAmount 歸給這一人
    if (results.length === 1 && results[0].amount === 0)
        return [{ name: results[0].name, amount: totalAmount }];

    // 分配沒金額的人
    const hasAmt = results.filter(r => r.amount > 0);
    const noAmt = results.filter(r => r.amount === 0);
    if (noAmt.length > 0 && hasAmt.length > 0) {
        const used = hasAmt.reduce((s, r) => s + r.amount, 0);
        const per = (totalAmount - used) / noAmt.length;
        return [...hasAmt, ...noAmt.map(r => ({ name: r.name, amount: per }))];
    }
    if (noAmt.length > 0 && hasAmt.length === 0) {
        const per = totalAmount / results.length;
        return results.map(r => ({ name: r.name, amount: per }));
    }
    return results.length > 0 ? results : [{ name: '', amount: totalAmount }];
}

// ===== splitPersons + _srcAmount 標記助手 =====
// v6.6.4 三方金額把關（原始=明細=個人小計）：第一筆標記 _srcAmount = 原始金額，
// 其餘 0；並修正任何浮點漂移，保證 sum(split.amount) === amount。
function pushSplitRecords(records, base, person, amount) {
    const splits = splitPersons(person, amount);
    if (splits.length === 0) { records.push({ ...base, person: '', amount, _srcAmount: amount }); return; }
    const sum = splits.reduce((s, x) => s + x.amount, 0);
    if (Math.abs(sum - amount) > 0.001) {
        // 調整最後一筆以嚴格保留原始總額（避免浮點/除不盡產生漂移）
        splits[splits.length - 1].amount += (amount - sum);
    }
    splits.forEach((sp, i) => {
        records.push({ ...base, person: sp.name, amount: sp.amount, _srcAmount: i === 0 ? amount : 0 });
    });
}

// ===== 清理分頁名稱（去除前導頁碼如 "7", "8.", "13."） =====
function cleanSheetName(name) {
    let s = name;
    // 去尾部頁碼：愛滋加班-7 → 愛滋加班
    s = s.replace(/[-－]\d+$/, '');
    // 有點的頁碼：2.支援→支援, 13.11-12月→11-12月, 8.1月→1月
    const dotClean = s.replace(/^\d+\.\s*/, '');
    if (dotClean !== s) return dotClean;
    // 已經是日期格式則保留不動
    if (/^\d{1,2}\/\d{1,2}/.test(s)) return s;        // M/D, MM/DD
    if (/^\d{1,2}月/.test(s)) return s;                // N月
    if (/^\d{4}[\u4e00-\u9fff.]/.test(s)) return s;   // MMDD+中文
    if (/^\d{3}[\u4e00-\u9fff]/.test(s)) return s;    // MDD+中文
    // 嘗試去1位頁碼→看是否露出MMDD日期
    const a1 = s.substring(1);
    if (/^\d{4}[\u4e00-\u9fff.]/.test(a1)) return a1;  // 70126低碳→0126低碳
    // 嘗試去2位頁碼→看是否露出MMDD日期
    const a2 = s.substring(2);
    if (s.length > 6 && /^\d{4}[\u4e00-\u9fff.]/.test(a2)) return a2; // 130818高齡→0818高齡
    // 嘗試去1位→MDD
    if (/^\d{3}[\u4e00-\u9fff]/.test(a1)) return a1;
    // 去2位→MDD
    if (s.length > 5 && /^\d{3}[\u4e00-\u9fff]/.test(a2)) return a2;
    // 預設去第一個數字
    if (/^\d/.test(s)) return a1;
    return s;
}

// ===== 跳過行判斷 =====
function isSkipRow(row) {
    const t = row.map(v => String(v)).join('').replace(/\s/g, '');
    return t.includes('合計') || t.includes('總計') || t.includes('製表') || t.includes('股長');
}

function isValidOffice(name) {
    if (!name) return false;
    const clean = name.replace(/\s/g, '');
    if (!clean) return false;
    if (clean.includes('總計') || clean.includes('合計') || clean.includes('製表')) return false;
    // 接受代碼 (z01~z37)
    if (OFFICE_CODE_MAP[clean.toLowerCase()]) return true;
    // 必須含有「衛生所」或「區」等中文地名關鍵字
    if (clean.includes('衛生所') || clean.includes('衛生局')) return true;
    if (/[\u4e00-\u9fff].*區/.test(clean)) return true;
    if (clean === '(傳票明細)' || clean === '(整理總表)') return true;
    return false;
}

function safeFloat(v) {
    if (v === null || v === undefined || v === '') return 0;
    if (typeof v === 'number') return v;
    const s = String(v).trim();
    if (/^-?\d+(\.\d+)?$/.test(s)) return parseFloat(s);
    return 0;
}

function getRow(sheet, r) {
    const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
    const row = [];
    for (let c = range.s.c; c <= range.e.c; c++) {
        const addr = XLSX.utils.encode_cell({ r, c });
        const cell = sheet[addr];
        row.push(cell ? (cell.v !== undefined ? cell.v : '') : '');
    }
    return row;
}

function sheetRows(sheet) {
    const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
    return range.e.r + 1;
}

function sheetCols(sheet) {
    const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
    return range.e.c + 1;
}

// ===== 偵測分頁類型 =====
function detectSheetType(sheet, name, idx) {
    const nrows = sheetRows(sheet);
    const ncols = sheetCols(sheet);
    if (nrows < 3) return 'empty';

    let hasData = false;
    for (let r = 0; r < Math.min(nrows, 10); r++) {
        const row = getRow(sheet, r);
        if (row.some(v => String(v).trim())) { hasData = true; break; }
    }
    if (!hasData) return 'empty';

    // 本工具產出的整理總表
    for (let r = 0; r < Math.min(nrows, 5); r++) {
        const row = getRow(sheet, r);
        const cells = row.map(v => String(v).replace(/\s/g, '').trim());
        if (cells.includes('分頁') && cells.includes('類型') && cells.includes('姓名') && cells.includes('金額') && cells.includes('事由'))
            return 'self_output';
    }

    // 彙總表
    if (name.includes('彙總') || idx === 0) {
        for (let r = 0; r < Math.min(nrows, 3); r++) {
            const t = getRow(sheet, r).join('');
            if (t.includes('匯款明細') || t.includes('彙總')) return 'summary';
        }
    }

    let headerText = '';
    for (let r = 0; r < Math.min(nrows, 10); r++) headerText += getRow(sheet, r).join('');

    if (ncols <= 4) {
        for (let r = 0; r < Math.min(nrows, 5); r++) {
            const t = getRow(sheet, r).join('');
            if (t.includes('編號') && (t.includes('鄉鎮別') || t.includes('金額')))
                return 'overtime_summary';
        }
    }

    if (headerText.includes('姓   名') && headerText.includes('出   差')) return 'travel_traffic';
    if (headerText.includes('領受人')) {
        return (name.includes('加班') || headerText.includes('加班')) ? 'overtime_detail' : 'travel_detail';
    }
    // 傳票格式：金額拆成百萬/十萬/萬/千/百/十/元 (要在 travel_list 前偵測)
    if (headerText.includes('差旅費明細') || (headerText.includes('名    稱') && headerText.includes('金     額')))
        return 'voucher_detail';

    if (headerText.includes('旅費明細') || headerText.includes('金額(元)') || headerText.includes('金額（元）'))
        return 'travel_list';

    for (let r = 0; r < Math.min(nrows, 5); r++) {
        const t = getRow(sheet, r).join('');
        if ((t.includes('衛生所') || t.includes('鄉鎮')) && (t.includes('金額') || t.includes('備註')))
            return 'travel_list';
    }

    return 'empty';
}

// ===== 智慧欄位偵測 =====
function findHeaderRow(sheet, keyword) {
    // 尋找真正的欄位標題列（多個欄位關鍵字分佈在不同 cell）
    const nrows = sheetRows(sheet);
    for (let r = 0; r < Math.min(nrows, 15); r++) {
        const row = getRow(sheet, r);
        const cells = row.map(v => String(v).trim()).filter(s => s);
        // 欄位標題列：至少2個不同cell有關鍵字
        let hits = 0;
        cells.forEach(s => {
            if (s === '領受人' || s.includes('衛生所') || s === '所別' || s === '金額' || s === '總計' || s.includes('備註') || s === '編號' || s.includes('衛生所名稱')) hits++;
        });
        if (hits >= 2 && row.some(v => String(v).trim() === keyword || String(v).trim().includes(keyword))) {
            return r;
        }
    }
    // fallback: 找包含 keyword 的行（但只在獨立 cell 中）
    for (let r = 0; r < Math.min(nrows, 15); r++) {
        const row = getRow(sheet, r);
        if (row.some(v => { const s = String(v).trim(); return s === keyword || (s.length < 10 && s.includes(keyword)); })) {
            return r;
        }
    }
    return -1;
}

function detectColumns(sheet, headerRow) {
    const row = getRow(sheet, headerRow);
    let officeCol = -1, personCol = -1, amountCol = -1, noteCol = -1;
    row.forEach((v, c) => {
        const s = String(v).trim();
        if ((s.includes('衛生所') || s === '所別' || s.includes('衛生所名稱') || s === '鄉鎮別') && officeCol === -1) officeCol = c;
        if (s.includes('領受人') && personCol === -1) personCol = c;
        if ((s === '金額' || (s.includes('金額') && !s.includes('總'))) && amountCol === -1) amountCol = c;
        if (s === '總計' && amountCol === -1) amountCol = c;
        if (s.includes('備註') && noteCol === -1) noteCol = c;
    });
    return { officeCol, personCol, amountCol, noteCol };
}

// ===== 解析各類型 =====
function extractOvertimeDetail(sheet, sheetName, fileLabel) {
    const nrows = sheetRows(sheet);
    const records = [];
    let currentOffice = '';

    const hdr = findHeaderRow(sheet, '領受人');
    const startRow = hdr >= 0 ? hdr + 1 : 6;
    const cols = hdr >= 0 ? detectColumns(sheet, hdr) : {};
    const officeCol = cols.officeCol >= 0 ? cols.officeCol : 1;
    const personCol = cols.personCol >= 0 ? cols.personCol : 2;
    const amountCol = cols.amountCol >= 0 ? cols.amountCol : 5;
    const noteCol = cols.noteCol >= 0 ? cols.noteCol : 7;

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row) || !row.some(v => String(v).trim())) continue;
        let office = String(row[officeCol] || '').trim();
        if (office && (office.includes('衛生所') || office.includes('區') || OFFICE_CODE_MAP[office.toLowerCase()])) {
            if (!office.includes('衛生所') && office.includes('區')) office += '衛生所';
            currentOffice = office;
        }
        const person = String(row[personCol] || '').trim();
        let amount = safeFloat(row[amountCol]);
        if (amount === 0) amount = safeFloat(row[5]);
        if (amount === 0) amount = safeFloat(row[4]);
        const note = String(row[noteCol] || '').trim();
        if (amount > 0 && currentOffice) {
            pushSplitRecords(records, { office: currentOffice, sheet: sheetName, type: '加班費', reason: note || sheetName }, person, amount);
        }
    }
    return records;
}

function extractOvertimeSummary(sheet, sheetName, fileLabel) {
    const nrows = sheetRows(sheet);
    const records = [];
    let purpose = sheetName;
    for (let r = 0; r < Math.min(nrows, 5); r++) {
        const t = getRow(sheet, r).join('');
        if (t.includes('用途')) { purpose = t.replace(/用途[：:]/, '').trim(); break; }
    }
    let feeType = '加班費';
    if (purpose.includes('差旅') || purpose.includes('旅費')) feeType = '差旅費';
    else if (purpose.includes('誤餐') || purpose.includes('醫護') || purpose.includes('宣導') || purpose.includes('郵簡')) feeType = '其他費用';

    // 智慧偵測欄位
    let officeCol = 1, amountCol = 2, personCol = -1, startRow = 2;
    for (let r = 0; r < Math.min(nrows, 5); r++) {
        const row = getRow(sheet, r);
        const cells = row.map(v => String(v).trim());
        if (cells.some(s => s.includes('鄉鎮') || s.includes('衛生所') || s === '編號')) {
            startRow = r + 1;
            cells.forEach((s, c) => {
                if (s.includes('鄉鎮') || s.includes('衛生所名稱') || s.includes('衛生所')) officeCol = c;
                if (s === '金額' || s === '總計' || (s.includes('金額') && !s.includes('總'))) amountCol = c;
                if (s.includes('領受人')) personCol = c;
            });
            break;
        }
    }

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row)) continue;
        const office = String(row[officeCol] || '').trim();
        const amount = safeFloat(row[amountCol]);
        const person = personCol >= 0 ? String(row[personCol] || '').trim() : '';
        if (amount > 0 && office && isValidOffice(office)) {
            if (person) {
                pushSplitRecords(records, { office, sheet: sheetName, type: feeType, reason: purpose }, person, amount);
            } else {
                records.push({ office, person: '', amount, sheet: sheetName, type: feeType, reason: purpose, _srcAmount: amount });
            }
        }
    }
    return records;
}

function extractTravelTraffic(sheet, sheetName, fileLabel) {
    const nrows = sheetRows(sheet);
    const records = [];
    let startRow = 4;
    for (let r = 0; r < Math.min(nrows, 10); r++) {
        if (getRow(sheet, r).join('').match(/姓.*名/)) { startRow = r + 1; break; }
    }

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row) || !row.some(v => String(v).trim())) continue;
        const person = String(row[0] || '').trim();
        const amount = safeFloat(row[4]);
        let district = String(row[5] || '').trim();
        const note = String(row[7] || '').trim();
        if (amount > 0 && person) {
            const office = district && !district.includes('衛生所') ? district + '衛生所' : district;
            pushSplitRecords(records, { office, sheet: sheetName, type: '差旅費', reason: note || sheetName }, person, amount);
        }
    }
    return records;
}

function extractTravelList(sheet, sheetName, fileLabel) {
    const nrows = sheetRows(sheet);
    const records = [];
    let officeCol = 0, amountCol = 1, noteCol = 2, startRow = 3;

    for (let r = 0; r < Math.min(nrows, 5); r++) {
        const row = getRow(sheet, r);
        const t = row.join('');
        if ((t.includes('衛生所') || t.includes('鄉鎮')) && (t.includes('金額') || t.includes('備註'))) {
            startRow = r + 1;
            row.forEach((v, c) => {
                const s = String(v).trim();
                if (s.includes('衛生所') || s.includes('鄉鎮')) officeCol = c;
                if (s.includes('金額')) amountCol = c;
                if (s.includes('備註')) noteCol = c;
            });
            break;
        }
    }

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row)) continue;
        let officeRaw = String(row[officeCol] || '').trim();
        const amount = safeFloat(row[amountCol]);
        const note = String(row[noteCol] || '').trim();
        if (amount > 0 && officeRaw) {
            let office = officeRaw.replace(/^\d+\.?\s*/, '').trim() || officeRaw;
            if (!office.includes('衛生所') && office.includes('區')) office += '衛生所';
            let person = '';
            if (note) {
                const m = note.match(/\d+\/\d+\s*(.+)/);
                person = m ? m[1].trim() : note;
            }
            pushSplitRecords(records, { office, sheet: sheetName, type: '差旅費', reason: sheetName }, person, amount);
        }
    }
    return records;
}

function extractVoucherDetail(sheet, sheetName, fileLabel) {
    // 傳票格式：姓名在 col0，金額分拆成百萬~元各欄，col10 有小計金額
    const nrows = sheetRows(sheet);
    const records = [];
    let startRow = 8, subtotalCol = 10;

    // 找到有「名 稱」和「金 額」的 header
    for (let r = 0; r < Math.min(nrows, 10); r++) {
        const row = getRow(sheet, r);
        const t = row.join('');
        if (t.includes('小計') || t.includes('小 計')) {
            row.forEach((v, c) => { if (String(v).includes('小計') || String(v).includes('小 計')) subtotalCol = c; });
        }
        if (t.replace(/\s/g, '').includes('名稱') && t.replace(/\s/g, '').includes('金額')) {
            startRow = r + 2; // skip header + sub-header (百萬/十萬...)
            break;
        }
    }

    // 從彙總表標題取得衛生所或用途資訊
    let purpose = sheetName;
    for (let r = 0; r < Math.min(nrows, 8); r++) {
        const t = getRow(sheet, r).join('');
        if (t.includes('明細表')) { purpose = t.replace(/\s/g, '').match(/[^表]+明細表/)?.[0] || sheetName; break; }
    }

    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row)) continue;
        const person = String(row[0] || '').trim();
        if (!person) continue;
        // 只取小計欄有值的行（每人小計）
        const amount = safeFloat(row[subtotalCol]);
        if (amount > 0) {
            records.push({ office: '(傳票明細)', person, amount, sheet: sheetName, type: '差旅費', reason: purpose, _srcAmount: amount });
        }
    }
    return records;
}

// ===== 讀取本工具產出的整理總表 =====
function extractSelfOutput(sheet, sheetName) {
    const nrows = sheetRows(sheet);
    const records = [];

    // 從標題或 sheetName 提取衛生所
    let office = '';
    for (let r = 0; r < Math.min(nrows, 3); r++) {
        const t = String(getRow(sheet, r)[0] || '').replace(/\s+/g, '');
        const om = t.match(/([\u4e00-\u9fff]{1,2}[區鄉市]衛生所)/);
        if (om) { office = om[1]; break; }
    }
    if (!office) {
        const sn = sheetName.replace(/\s+/g, '');
        const sm = sn.match(/([\u4e00-\u9fff]{1,2}[區鄉市]衛生所)/);
        if (sm) office = sm[1];
    }

    // 找標題列（分頁|類型|姓名|金額|事由 或 分頁|類型|衛生所|姓名|金額|事由）
    let headerRow = -1, colSheet = 0, colType = -1, colOffice = -1, colPerson = 2, colAmount = 3, colReason = 4;
    for (let r = 0; r < Math.min(nrows, 10); r++) {
        const row = getRow(sheet, r);
        const cells = row.map(v => String(v).replace(/\s/g, '').trim());
        if (cells.includes('分頁') && cells.includes('金額')) {
            headerRow = r;
            cells.forEach((s, c) => {
                if (s === '分頁') colSheet = c;
                if (s === '類型') colType = c;
                if (s === '衛生所' || s === '所別') colOffice = c;
                if (s === '姓名') colPerson = c;
                if (s === '金額' && colAmount === 3) colAmount = c;
                if (s === '事由') colReason = c;
            });
            break;
        }
    }
    if (headerRow < 0) return records;

    for (let r = headerRow + 1; r < nrows; r++) {
        const row = getRow(sheet, r);
        const first = String(row[0] || '').trim();
        // 遇到「個人小計」「加班費彙整」「製表人」就停止
        if (first === '個人小計' || first === '加班費彙整' || first.startsWith('製表人')) break;
        // 不用 isSkipRow（分頁名可能含「合計」字樣），改用精準判斷
        const personVal = String(row[colPerson] || '').trim();
        if (personVal === '合計' || personVal === '總計') continue;
        if (!row.some(v => String(v).trim())) continue;

        const amount = safeFloat(row[colAmount]);
        if (amount <= 0) continue;

        const type = colType >= 0 ? (String(row[colType] || '').trim() || '差旅費') : '差旅費';
        const rowOffice = colOffice >= 0 ? String(row[colOffice] || '').trim() : '';
        records.push({
            office: rowOffice || office || '(整理總表)',
            person: personVal,
            amount: amount,
            sheet: String(row[colSheet] || '').trim(),
            type: type,
            reason: String(row[colReason] || '').trim(),
            _srcAmount: amount
        });
    }
    return records;
}

// ===== 代辦經費彙整表偵測與解析 =====
function isExpenseReportFile(wb, filename) {
    if (filename && filename.includes('代辦經費')) return true;
    if (wb.SheetNames.length >= 3) {
        const numSheets = wb.SheetNames.filter(n => /^\d+$/.test(n.trim())).length;
        if (numSheets >= 2) {
            const firstSheet = wb.Sheets[wb.SheetNames[0]];
            for (let r = 2; r < Math.min(sheetRows(firstSheet), 6); r++) {
                const row = getRow(firstSheet, r);
                if (row.some(v => /^z\d{2}$/i.test(String(v).trim()))) return true;
            }
        }
    }
    return false;
}

function extractExpenseReportSheet(sheet, sheetName) {
    const nrows = sheetRows(sheet);
    const ncols = sheetCols(sheet);
    const records = [];

    // 從前5列 col A 取用途
    let purpose = sheetName;
    for (let r = 0; r < Math.min(nrows, 5); r++) {
        const val = String(getRow(sheet, r)[0] || '').trim();
        if (val.startsWith('用途')) {
            purpose = val.replace(/^用途[：:]\s*/, '').trim();
            break;
        }
    }

    // 判斷費用類型
    let feeType = '差旅費';
    if (purpose.includes('加班')) feeType = '加班費';
    else if (!purpose.includes('交通') && !purpose.includes('差旅') && !purpose.includes('旅費') && !purpose.includes('訪視') && !purpose.includes('都治') && !purpose.includes('檢討')) {
        feeType = '其他費用';
    }

    // === 策略1：右側面板（cols F+）找 衛生所|領受人 子標題 ===
    if (ncols >= 9) {
        let startRow = -1;
        let officeCol = 5, personCol = 6, amountCol = 8, noteCol = 10;

        for (let r = 0; r < Math.min(nrows, 10); r++) {
            const row = getRow(sheet, r);
            const colF = String(row[5] || '').replace(/\s/g, '').trim();
            const colG = String(row[6] || '').replace(/\s/g, '').trim();
            if ((colF === '衛生所' || colF.includes('所別')) && (colG === '領受人' || colG === '姓名')) {
                startRow = r + 1;
                for (let c = 5; c < Math.min(ncols, 12); c++) {
                    const s = String(row[c] || '').replace(/\s/g, '').trim();
                    if (s === '衛生所' || s.includes('所別')) officeCol = c;
                    if (s === '領受人' || s === '姓名') personCol = c;
                    if (s === '金額') amountCol = c;
                    if (s.includes('備註')) noteCol = c;
                }
                break;
            }
        }

        if (startRow >= 0) {
            for (let r = startRow; r < nrows; r++) {
                const row = getRow(sheet, r);
                const office = String(row[officeCol] || '').trim();
                const person = String(row[personCol] || '').trim();
                const amountRaw = String(row[amountCol] || '').trim();
                const amount = safeFloat(row[amountCol]);
                const note = noteCol < ncols ? String(row[noteCol] || '').trim() : '';

                if (!office || office === '合計' || office === '總計' || office.includes('合計')) continue;
                if (person === 'X' || amountRaw === 'X') continue;
                if (!person || amount <= 0) continue;

                records.push({ office, person, amount, sheet: purpose || sheetName, type: feeType, reason: note || purpose, _srcAmount: amount });
            }
            if (records.length > 0) return records;
        }
    }

    // === 策略2：簡易格式 衛生所|領受人|金額 標題列 ===
    for (let r = 0; r < Math.min(nrows, 8); r++) {
        const row = getRow(sheet, r);
        const texts = row.map(v => String(v).replace(/\s/g, '').trim());
        let sOfficeCol = -1, sPersonCol = -1, sAmountCol = -1;
        texts.forEach((s, c) => {
            if (s === '衛生所' || s.includes('所別')) sOfficeCol = c;
            if (s === '領受人' || s === '姓名') sPersonCol = c;
            if (s === '金額' && sAmountCol < 0) sAmountCol = c;
        });
        if (sOfficeCol >= 0 && sPersonCol >= 0 && sAmountCol >= 0) {
            for (let dr = r + 1; dr < nrows; dr++) {
                const drow = getRow(sheet, dr);
                if (isSkipRow(drow)) continue;
                const office = String(drow[sOfficeCol] || '').trim();
                const person = String(drow[sPersonCol] || '').trim();
                const amount = safeFloat(drow[sAmountCol]);
                if (!office || amount <= 0) continue;
                if (!office.includes('衛生所') && !office.includes('區')) continue;
                records.push({ office, person, amount, sheet: purpose || sheetName, type: feeType, reason: purpose, _srcAmount: amount });
            }
            if (records.length > 0) return records;
        }
    }

    // === 策略3：左側面板 z-code 格式（編號|鄉鎮別|金額）===
    let startRow = 4, officeCol = 1, amountCol = 2;
    for (let r = 0; r < Math.min(nrows, 6); r++) {
        const row = getRow(sheet, r);
        const texts = row.map(v => String(v).trim());
        if (texts.includes('編號') || texts.includes('鄉鎮別')) {
            startRow = r + 1;
            texts.forEach((s, c) => {
                if (s === '鄉鎮別' || s.includes('衛生所')) officeCol = c;
                if (s === '金額') amountCol = c;
            });
            break;
        }
    }
    for (let r = startRow; r < nrows; r++) {
        const row = getRow(sheet, r);
        if (isSkipRow(row)) continue;
        const zCode = String(row[0] || '').trim();
        const office = String(row[officeCol] || '').trim();
        const amount = safeFloat(row[amountCol]);
        if (!zCode || !/^z\d{2}$/i.test(zCode)) continue;
        if (amount <= 0) continue;
        records.push({ office, person: '', amount, sheet: purpose || sheetName, type: feeType, reason: purpose, _srcAmount: amount });
    }

    return records;
}

// ===== 主處理 =====
function processFile(file) {
    document.getElementById('progressArea').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';
    const log = document.getElementById('logArea');
    const fill = document.getElementById('progressFill');
    const pct = document.getElementById('progressPct');
    log.innerHTML = '';
    function addLog(msg) {
        // 去除舊 emoji 前綴,統一為 → 前綴
        const clean = msg.replace(/^[📤📖📂📋📊🏥👤⚠️✅❌]\s*/u, '').trim();
        log.innerHTML += '→ ' + clean + '\n';
        log.scrollTop = log.scrollHeight;
    }
    function setPct(v) {
        fill.style.width = v + '%';
        pct.textContent = v + '%';
        if (v >= 100) fill.classList.add('done');
        else fill.classList.remove('done');
    }

    addLog('讀取檔案中');
    setPct(20);

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            addLog('解析 XLS');
            setPct(40);

            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const allRecords = [];

            addLog(`${file.name} — 共 ${wb.SheetNames.length} 個分頁`);
            setPct(50);

            const typeLabels = {
                'overtime_detail': '加班明細', 'overtime_summary': '費用彙整',
                'travel_detail': '差旅明細', 'travel_traffic': '交通差旅',
                'travel_list': '旅費清單', 'voucher_detail': '傳票明細', 'summary': '彙總表', 'self_output': '整理總表'
            };

            // 偵測代辦經費彙整表格式
            const isExpenseReport = isExpenseReportFile(wb, file.name);
            if (isExpenseReport) addLog('偵測為代辦經費彙整表格式');

            // 偵測多分頁自產檔：有「全部明細」sheet 時只讀該 sheet（避免重複計算）
            const hasSelfAllSheet = wb.SheetNames.includes('全部明細') || wb.SheetNames.includes('整理總表');
            const selfMultiSheet = hasSelfAllSheet && wb.SheetNames.length > 1 &&
                wb.SheetNames.some(n => detectSheetType(wb.Sheets[n], n, 0) === 'self_output');
            const selfMainSheet = wb.SheetNames.includes('全部明細') ? '全部明細' : '整理總表';

            wb.SheetNames.forEach((name, idx) => {
                const sheet = wb.Sheets[name];

                if (isExpenseReport) {
                    if (idx === 0) {
                        addLog(`   [${idx}] ${name} → 彙整總表 (略過)`);
                        return;
                    }
                    const recs = extractExpenseReportSheet(sheet, name);
                    allRecords.push(...recs);
                    addLog(`   [${idx}] ${name} → 代辦明細 (${recs.length} 筆)`);
                    return;
                }

                const type = detectSheetType(sheet, name, idx);
                if (type === 'empty') return;

                // 多分頁自產檔：只讀主 sheet，其餘全部略過（避免重複計算）
                if (selfMultiSheet && name !== selfMainSheet) {
                    addLog(`   [${idx}] ${name} → 整理總表分頁 (略過，避免重複)`);
                    return;
                }

                let recs = [];
                if (type === 'overtime_detail') recs = extractOvertimeDetail(sheet, name);
                else if (type === 'overtime_summary') recs = extractOvertimeSummary(sheet, name);
                else if (type === 'travel_detail') recs = extractTravelDetail(sheet, name);
                else if (type === 'travel_traffic') recs = extractTravelTraffic(sheet, name);
                else if (type === 'travel_list') recs = extractTravelList(sheet, name);
                else if (type === 'voucher_detail') recs = extractVoucherDetail(sheet, name);
                else if (type === 'self_output') recs = extractSelfOutput(sheet, name);

                allRecords.push(...recs);
                if (recs.length > 0 || type === 'summary')
                    addLog(`   [${idx}] ${name} → ${typeLabels[type] || type} (${recs.length} 筆)`);
            });

            setPct(80);

            // 代碼轉換為衛生所名稱 (z20 → 佳里區衛生所)
            allRecords.forEach(r => {
                r.office = resolveOffice(r.office);
                r.sheet = cleanSheetName(r.sheet);
                r.person = cleanPersonName(r.person);
                r.reason = cleanSheetName(r.reason);
            });

            // 過濾無效衛生所名稱
            const validRecords = allRecords.filter(r => isValidOffice(r.office));

            // 個人小計：有姓名的合併，無姓名的逐筆列出
            const personMap = {};
            const unknownList = [];
            validRecords.forEach(r => {
                if (r.person) {
                    const key = r.office + '|' + r.person;
                    if (!personMap[key]) personMap[key] = { office: r.office, person: r.person, travelCount: 0 };
                    personMap[key][r.type] = (personMap[key][r.type] || 0) + r.amount;
                    if (r.type === '差旅費') personMap[key].travelCount++;
                } else {
                    unknownList.push({ office: r.office, person: '', travelCount: r.type === '差旅費' ? 1 : 0, [r.type]: r.amount, _unknown: true, _sheet: r.sheet });
                }
            });
            const personList = [...Object.values(personMap), ...unknownList].sort((a, b) => a.office.localeCompare(b.office));

            // 衛生所清單
            const offices = [...new Set(validRecords.map(r => r.office))].filter(isValidOffice)
                .sort((a, b) => (OFFICE_ORDER[a] ?? 999) - (OFFICE_ORDER[b] ?? 999));
            const overtimeCount = validRecords.filter(r => r.type === '加班費').length;
            const grandTotal = validRecords.reduce((s, r) => s + r.amount, 0);

            // v6.6.4 三方金額把關：原始 vs 明細 vs 個人小計（每個衛生所 & 全部）
            const sourceByOffice = {}, detailByOffice = {}, personByOffice = {};
            validRecords.forEach(r => {
                if (r._srcAmount) sourceByOffice[r.office] = (sourceByOffice[r.office] || 0) + r._srcAmount;
                detailByOffice[r.office] = (detailByOffice[r.office] || 0) + r.amount;
            });
            personList.forEach(p => {
                const sum = (p['差旅費'] || 0) + (p['加班費'] || 0) + (p['其他費用'] || 0);
                personByOffice[p.office] = (personByOffice[p.office] || 0) + sum;
            });
            const mismatches = [];
            const allOffices = new Set([...Object.keys(sourceByOffice), ...Object.keys(detailByOffice), ...Object.keys(personByOffice)]);
            allOffices.forEach(o => {
                const s = sourceByOffice[o] || 0;
                const d = detailByOffice[o] || 0;
                const p = personByOffice[o] || 0;
                if (Math.abs(s - d) > 0.001 || Math.abs(d - p) > 0.001 || Math.abs(s - p) > 0.001) {
                    mismatches.push({ office: o, source: s, detail: d, person: p });
                }
            });
            const grandSource = Object.values(sourceByOffice).reduce((s, v) => s + v, 0);
            const grandPerson = Object.values(personByOffice).reduce((s, v) => s + v, 0);
            if (mismatches.length > 0) {
                addLog('金額自檢發現不一致：');
                mismatches.forEach(m => addLog(`  ${m.office}: 原始=${m.source.toLocaleString()} 明細=${m.detail.toLocaleString()} 個人=${m.person.toLocaleString()}`));
            } else {
                addLog(`金額自檢通過：原始 ${grandSource.toLocaleString()} = 明細 ${grandTotal.toLocaleString()} = 個人小計 ${grandPerson.toLocaleString()}`);
            }

            if (validRecords.length === 0) {
                addLog('未偵測到有效資料');
                setPct(100);
                document.getElementById('progressArea').style.display = 'none';
                showNoDataModal(file.name);
                return;
            }

            addLog(`共 ${validRecords.length} 筆明細（姓名已拆分）`);
            addLog(`衛生所: ${offices.length} 個`);
            addLog(`不重複人員: ${personList.length} 人`);
            addLog('處理完成');
            setPct(100);

            const unknownCount = validRecords.filter(r => !r.person).length;

            resultData = {
                allRecords: validRecords,
                offices,
                personList,
                overtimeCount,
                grandTotal,
                unknownCount,
                personCount: personList.length,
                sourceByOffice,
                detailByOffice,
                personByOffice,
                grandSource,
                grandPerson,
                fileName: file.name.replace(/\.(xlsx?|csv)$/i, '').replace(/^[\d,]+元/, ''),
                fileTitle: extractFileTitle(file.name),
                wb  // 保留原始 workbook 供下載用
            };

            showResult();
            document.getElementById('progressArea').style.display = 'none';

        } catch (err) {
            addLog('錯誤: ' + err.message);
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(file);
}

// ===== 顯示結果 =====
