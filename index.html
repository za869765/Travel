    document.getElementById('resultArea').style.display = 'block';

    const hasUnknown = r.unknownCount > 0;
    const unknownCol = hasUnknown
        ? `<div class="stat-col fail"><div class="stat-label">無姓名</div><div class="stat-value">${r.unknownCount}</div><div class="stat-unit">需補</div></div>`
        : '';

    document.getElementById('resultSummary').innerHTML = `
        <div class="stat-bar${hasUnknown ? ' has-unknown' : ''}">
            <div class="stat-col">
                <div class="stat-label">明細筆數</div>
                <div class="stat-value">${r.allRecords.length}</div>
                <div class="stat-unit">筆</div>
            </div>
            <div class="stat-col">
                <div class="stat-label">衛生所數</div>
                <div class="stat-value">${r.offices.length}</div>
                <div class="stat-unit">所</div>
            </div>
            <div class="stat-col">
                <div class="stat-label">加班費筆數</div>
                <div class="stat-value">${r.overtimeCount}</div>
                <div class="stat-unit">筆</div>
            </div>
            <div class="stat-col">
                <div class="stat-label">不重複人員</div>
                <div class="stat-value">${r.personCount}</div>
                <div class="stat-unit">人</div>
            </div>
            <div class="stat-col">
                <div class="stat-label">總金額</div>
                <div class="stat-value">$${r.grandTotal.toLocaleString()}</div>
                <div class="stat-unit">元</div>
            </div>
            ${unknownCol}
        </div>
    `;

    // count-up 動畫:所有 stat 主數字由 0 滾到目標
    requestAnimationFrame(() => {
        const cols = document.querySelectorAll('#resultSummary .stat-col');
        const values = [r.allRecords.length, r.offices.length, r.overtimeCount, r.personCount, r.grandTotal];
        const prefixes = ['', '', '', '', '$'];
        if (hasUnknown) { values.push(r.unknownCount); prefixes.push(''); }
        cols.forEach((col, i) => {
            const vEl = col.querySelector('.stat-value');
            if (vEl) {
                vEl.textContent = prefixes[i] + '0';
                setTimeout(() => LiveNum.countUp(vEl, values[i], { prefix: prefixes[i] }), 200 + i * 80);
            }
        });
    });

    const sel = document.getElementById('officeSelect');
    sel.innerHTML = '<option value="">-- 全部衛生所 --</option>';
    r.offices.forEach(o => {
        const code = OFFICE_CODE_REVERSE[o] ? OFFICE_CODE_REVERSE[o] + ' ' : '';
        sel.innerHTML += `<option value="${o}">${code}${o}</option>`;
    });

    // 預設選擇：上次使用的衛生所 > 佳里區衛生所 > 全部
    const lastOffice = localStorage.getItem('lastOffice');
    if (lastOffice && r.offices.includes(lastOffice)) {
        sel.value = lastOffice;
    } else {
        const defaultOffice = r.offices.find(o => o.includes('佳里'));
        if (defaultOffice) sel.value = defaultOffice;
    }

    filterByOffice();
}

// v6.6.5 把明細依 personList 順序排序（同一人的列聚在一起，順序與個人小計一致）
function sortRecordsByPersonOrder(records, personList) {
    const order = new Map();
    personList.forEach((p, i) => order.set(p.office + '|' + (p.person || ''), i));
    return records.slice().sort((a, b) => {
        const ka = a.office + '|' + (a.person || '');
        const kb = b.office + '|' + (b.person || '');
        const oa = order.has(ka) ? order.get(ka) : 99999;
        const ob = order.has(kb) ? order.get(kb) : 99999;
        return oa - ob;
    });
}

function filterByOffice() {
    if (!resultData) return;
    const office = document.getElementById('officeSelect').value;
    localStorage.setItem('lastOffice', office);
    const rawRecords = office ? resultData.allRecords.filter(r => r.office === office) : resultData.allRecords;
    const records = sortRecordsByPersonOrder(rawRecords, resultData.personList);
    const total = records.reduce((s, r) => s + r.amount, 0);

    // v6.6.4 三方金額把關（原始 vs 明細 vs 個人小計）
    const sourceAmt = office
        ? (resultData.sourceByOffice[office] || 0)
        : resultData.grandSource;
    const personAmt = office
        ? (resultData.personByOffice[office] || 0)
        : resultData.grandPerson;
    const detailAmt = total;
    const threeMatch = Math.abs(sourceAmt - detailAmt) < 0.01 &&
                       Math.abs(detailAmt - personAmt) < 0.01 &&
                       Math.abs(sourceAmt - personAmt) < 0.01;
    const checkBadge = threeMatch
        ? `<span class="recon-ok">● 原始=明細=個人小計 均為 ${detailAmt.toLocaleString()} 元</span>`
        : `<span class="recon-fail">■ 三方金額不一致 → 原始 ${sourceAmt.toLocaleString()} / 明細 ${detailAmt.toLocaleString()} / 個人小計 ${personAmt.toLocaleString()}</span>`;

    // 資訊列
    document.getElementById('selectedInfo').style.display = 'block';
    document.getElementById('selectedInfo').innerHTML = office
        ? `<strong>${office}</strong>　共 <strong>${records.length}</strong> 筆，合計 <strong>${total.toLocaleString()}</strong> 元<br>${checkBadge}`
        : `全部衛生所　共 <strong>${records.length}</strong> 筆<br>${checkBadge}`;

    // 明細表
    document.getElementById('detailCard').style.display = 'block';
    document.getElementById('detailTitle').textContent = office ? `${office} 出差明細` : '全部出差明細';

    const officeHead = office ? '' : '<th>衛生所</th>';
    const colSpan = office ? 3 : 4;
    let rows = records.map(r =>
        `<tr>${office ? '' : `<td>${r.office}</td>`}<td>${r.sheet}</td><td>${r.type}</td><td>${r.person || '<span style="color:var(--ink-3)">–</span>'}</td><td class="num-cell">${r.amount.toLocaleString()}</td><td>${r.reason}</td></tr>`
    ).join('');
    document.getElementById('officeTable').innerHTML = `
        <table><thead><tr>${officeHead}<th>分頁</th><th>類型</th><th>姓名</th><th class="num-col">金額</th><th>事由</th></tr></thead><tbody>
        ${rows}
        <tr class="grand-total"><td colspan="${colSpan}" style="text-align:right">合計</td><td class="num-cell${threeMatch ? ' amount-ok' : ''}">${total.toLocaleString()}</td><td></td></tr></tbody></table>`;
    applyRowStagger(document.getElementById('officeTable'));

    // 個人小計
    renderPersonTable(office);
}

function renderPersonTable(filterOffice) {
    if (!resultData) return;
    let data = filterOffice ? resultData.personList.filter(p => p.office === filterOffice) : resultData.personList;

    document.getElementById('personCard').style.display = 'block';
    document.getElementById('personTitle').textContent = filterOffice ? `${filterOffice} 個人小計` : '全部個人小計';

    const feeTypes = ['差旅費', '加班費', '其他費用'];
    let gt = {};
    feeTypes.forEach(t => gt[t] = 0);

    const officeHead = filterOffice ? '' : '<th>衛生所</th>';
    let totalTravelCount = 0;
    let prows = data.map(p => {
        let rowTotal = 0;
        let cells = '';
        feeTypes.forEach(t => {
            const v = p[t] || 0;
            gt[t] += v;
            rowTotal += v;
            cells += `<td class="num-cell">${v ? v.toLocaleString() : '<span style="color:var(--ink-3)">–</span>'}</td>`;
        });
        const tc = p.travelCount || 0;
        totalTravelCount += tc;
        // 對帳徽章:比對「明細」中此人加總 vs 個人小計 rowTotal
        const badge = p._unknown
            ? `<span class="badge-recon warn"><span class="mark">▲</span>待補姓名</span>`
            : `<span class="badge-recon ok"><span class="mark">●</span>通過</span>`;
        return `<tr>${filterOffice ? '' : `<td>${p.office}</td>`}<td>${p.person || '<span style="color:var(--ink-3)">–</span>'}</td><td class="num-cell">${tc || '<span style="color:var(--ink-3)">–</span>'}</td>${cells}<td class="num-cell">${rowTotal.toLocaleString()}</td><td>${badge}</td></tr>`;
    }).join('');

    let grandTotal = Object.values(gt).reduce((s, v) => s + v, 0);
    let gtCells = feeTypes.map(t => `<td class="num-cell">${gt[t].toLocaleString()}</td>`).join('');

    document.getElementById('personDetail').innerHTML = `
        <table><thead><tr>${officeHead}<th>姓名</th><th class="num-col">差旅單</th>${feeTypes.map(t => `<th class="num-col">${t}</th>`).join('')}<th class="num-col">總計</th><th>對帳</th></tr></thead><tbody>
        ${prows}
        <tr class="grand-total">${filterOffice ? '' : '<td></td>'}<td>總計 (${data.length} 人)</td><td class="num-cell">${totalTravelCount}</td>${gtCells}<td class="num-cell amount-ok">${grandTotal.toLocaleString()}</td><td></td></tr></tbody></table>`;
    applyRowStagger(document.getElementById('personDetail'));

    // 衛生所分組:最後一列加底線區隔(只在全部檢視時有意義)
    if (!filterOffice) {
        const rows = document.querySelectorAll('#personDetail tbody tr');
        let prevOffice = '';
        rows.forEach((tr, idx) => {
            const cell = tr.querySelector('td');
            if (!cell) return;
            const curOffice = cell.textContent.trim();
            if (prevOffice && curOffice !== prevOffice && !tr.classList.contains('grand-total')) {
                const prevTr = rows[idx - 1];
                if (prevTr && !prevTr.classList.contains('grand-total')) prevTr.classList.add('group-last');
            }
            prevOffice = curOffice;
        });
    }
}

// ===== 下載 Excel =====
function downloadExcel() {
    if (!resultData) return;
    const office = document.getElementById('officeSelect').value;
    const rawRecords = office ? resultData.allRecords.filter(r => r.office === office) : resultData.allRecords;
    const feeTypes = ['差旅費', '加班費', '其他費用'];
    const personData = office ? resultData.personList.filter(p => p.office === office) : resultData.personList;
    // v6.6.5 明細依 personList 順序排序（同一人列聚合，順序與個人小計一致）
    const records = sortRecordsByPersonOrder(rawRecords, resultData.personList);
    const otRecords = records.filter(r => r.type === '加班費');

    const MAX_COLS = 6;  // 個人小計 6 欄為最寬
    const wb = XLSX.utils.book_new();
    const data = [];
    const idx = {};  // 記錄各區塊 row index

    const padRow = (arr) => {
        const r = arr.slice();
        while (r.length < MAX_COLS) r.push('');
        return r;
    };

    // === 區塊1: 全部明細 ===
    const title = resultData.fileTitle + (office ? ` ${office}` : '');
    idx.title = data.length;            data.push(padRow([title]));
    idx.mainHeader = data.length;       data.push(padRow(['分頁', '類型', '姓名', '金額', '事由']));
    idx.mainDataStart = data.length;
    records.forEach(r => data.push(padRow([r.sheet, r.type, r.person, r.amount, r.reason])));
    idx.mainDataEnd = data.length - 1;
    idx.mainTotal = data.length;        data.push(padRow(['', '', '合計', records.reduce((s, r) => s + r.amount, 0), '']));
    data.push(padRow([]));  // spacer

    // === 區塊2: 個人小計 ===
    idx.personTitle = data.length;      data.push(padRow(['個人小計']));
    idx.personHeader = data.length;     data.push(padRow(['姓名', '差旅單', ...feeTypes, '總計']));
    idx.personDataStart = data.length;
    personData.forEach(p => {
        const vals = feeTypes.map(t => p[t] || 0);
        data.push(padRow([p.person, p.travelCount || 0, ...vals, vals.reduce((s, v) => s + v, 0)]));
    });
    idx.personDataEnd = data.length - 1;
    // 個人小計合計列
    const grandVals = feeTypes.map(t => personData.reduce((s, p) => s + (p[t] || 0), 0));
    const grandTravelCount = personData.reduce((s, p) => s + (p.travelCount || 0), 0);
    idx.personTotal = data.length;      data.push(padRow(['總計', grandTravelCount, ...grandVals, grandVals.reduce((s, v) => s + v, 0)]));
    data.push(padRow([]));

    // === 區塊3: 加班費彙整 ===
    if (otRecords.length > 0) {
        idx.otTitle = data.length;      data.push(padRow(['加班費彙整']));
        idx.otHeader = data.length;     data.push(padRow(['分頁', '姓名', '金額', '事由']));
        idx.otDataStart = data.length;
        otRecords.forEach(r => data.push(padRow([r.sheet, r.person, r.amount, r.reason])));
        idx.otDataEnd = data.length - 1;
        idx.otTotal = data.length;      data.push(padRow(['', '合計', otRecords.reduce((s, r) => s + r.amount, 0), '']));
    }

    data.push(padRow([]));
    data.push(padRow([]));
    idx.maker = data.length;            data.push(padRow(['製表人：']));

    const ws = XLSX.utils.aoa_to_sheet(data);

    // A4 直式列印：6 欄總寬約 76 字元
    ws['!cols'] = [
        { wch: 18 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 18 }, { wch: 10 }
    ];

    // ===== 樣式定義（黑白） =====
    const thin   = { style: 'thin',   color: { rgb: '000000' } };
    const medium = { style: 'medium', color: { rgb: '000000' } };
    const double = { style: 'double', color: { rgb: '000000' } };
    const borderAll    = { top: thin, bottom: thin, left: thin, right: thin };
    const borderHeader = { top: medium, bottom: double, left: thin, right: thin };
    const borderTotal  = { top: double, bottom: medium, left: thin, right: thin };
    const borderTitle  = { bottom: medium };

    const getOrInit = (r, c) => {
        const addr = XLSX.utils.encode_cell({ r, c });
        if (!ws[addr]) ws[addr] = { t: 's', v: '' };
        if (!ws[addr].s) ws[addr].s = {};
        return ws[addr];
    };
    const styleRow = (r, cStart, cEnd, style) => {
        for (let c = cStart; c <= cEnd; c++) {
            const cell = getOrInit(r, c);
            cell.s = { ...cell.s, ...style, alignment: { ...(cell.s.alignment || {}), ...(style.alignment || {}) } };
        }
    };

    const alignCenter = { horizontal: 'center', vertical: 'center', wrapText: true };
    const alignLeft   = { horizontal: 'left',   vertical: 'center', wrapText: true };
    const alignRight  = { horizontal: 'right',  vertical: 'center', wrapText: true };
    const alignNum    = { horizontal: 'right',  vertical: 'center', wrapText: true };

    // 標題
    styleRow(idx.title, 0, MAX_COLS - 1, {
        font: { bold: true, sz: 16 },
        alignment: alignCenter,
        border: borderTitle
    });
    if (!ws['!rows']) ws['!rows'] = [];
    ws['!rows'][idx.title] = { hpt: 32 };

    // ---- 區塊1: 全部明細（6 欄，事由合併 E:F）----
    styleRow(idx.mainHeader, 0, 5, { font: { bold: true }, alignment: alignCenter, border: borderHeader });
    for (let r = idx.mainDataStart; r <= idx.mainDataEnd; r++) {
        styleRow(r, 0, 5, { alignment: alignLeft, border: borderAll });
        // 金額欄（col D / index 3）右對齊 + 千分位
        const amt = getOrInit(r, 3);
        amt.s.alignment = { ...amt.s.alignment, horizontal: 'right' };
        amt.z = '#,##0';
    }
    styleRow(idx.mainTotal, 0, 5, { font: { bold: true }, alignment: alignRight, border: borderTotal });
    const mainTotalAmt = getOrInit(idx.mainTotal, 3);
    mainTotalAmt.z = '#,##0';

    // ---- 區塊2: 個人小計 ----
    styleRow(idx.personTitle, 0, MAX_COLS - 1, {
        font: { bold: true, sz: 13 },
        alignment: alignLeft,
        border: { bottom: medium }
    });
    styleRow(idx.personHeader, 0, MAX_COLS - 1, { font: { bold: true }, alignment: alignCenter, border: borderHeader });
    for (let r = idx.personDataStart; r <= idx.personDataEnd; r++) {
        styleRow(r, 0, MAX_COLS - 1, { alignment: alignCenter, border: borderAll });
        // 數字欄（B~F / 1~5）右對齊 + 千分位
        for (let c = 1; c < MAX_COLS; c++) {
            const cell = getOrInit(r, c);
            cell.s.alignment = { ...cell.s.alignment, horizontal: 'right' };
            if (c >= 2) cell.z = '#,##0';
        }
    }
    styleRow(idx.personTotal, 0, MAX_COLS - 1, { font: { bold: true }, alignment: alignCenter, border: borderTotal });
    for (let c = 1; c < MAX_COLS; c++) {
        const cell = getOrInit(idx.personTotal, c);
        cell.s.alignment = { ...cell.s.alignment, horizontal: 'right' };
        if (c >= 2) cell.z = '#,##0';
    }

    // ---- 區塊3: 加班費彙整（6 欄，事由合併 D:F）----
    if (idx.otTitle !== undefined) {
        styleRow(idx.otTitle, 0, MAX_COLS - 1, {
            font: { bold: true, sz: 13 },
            alignment: alignLeft,
            border: { bottom: medium }
        });
        styleRow(idx.otHeader, 0, 5, { font: { bold: true }, alignment: alignCenter, border: borderHeader });
        for (let r = idx.otDataStart; r <= idx.otDataEnd; r++) {
            styleRow(r, 0, 5, { alignment: alignLeft, border: borderAll });
            const amt = getOrInit(r, 2);
            amt.s.alignment = { ...amt.s.alignment, horizontal: 'right' };
            amt.z = '#,##0';
        }
        styleRow(idx.otTotal, 0, 5, { font: { bold: true }, alignment: alignRight, border: borderTotal });
        const otTotAmt = getOrInit(idx.otTotal, 2);
        otTotAmt.z = '#,##0';
    }

    // 製表人
    getOrInit(idx.maker, 0).s = { font: { sz: 11 } };

    // ===== 合併儲存格 =====
    const merges = [
        { s: { r: idx.title, c: 0 },       e: { r: idx.title, c: MAX_COLS - 1 } },
        { s: { r: idx.personTitle, c: 0 }, e: { r: idx.personTitle, c: MAX_COLS - 1 } },
        { s: { r: idx.maker, c: 0 },       e: { r: idx.maker, c: MAX_COLS - 1 } },
    ];
    // 全部明細：事由欄合併 E:F（header/data/total 各列）
    merges.push({ s: { r: idx.mainHeader, c: 4 }, e: { r: idx.mainHeader, c: 5 } });
    for (let r = idx.mainDataStart; r <= idx.mainDataEnd; r++) {
        merges.push({ s: { r, c: 4 }, e: { r, c: 5 } });
    }
    merges.push({ s: { r: idx.mainTotal, c: 4 }, e: { r: idx.mainTotal, c: 5 } });
    if (idx.otTitle !== undefined) {
        merges.push({ s: { r: idx.otTitle, c: 0 }, e: { r: idx.otTitle, c: MAX_COLS - 1 } });
        // 加班費彙整：事由欄合併 D:F
        merges.push({ s: { r: idx.otHeader, c: 3 }, e: { r: idx.otHeader, c: 5 } });
        for (let r = idx.otDataStart; r <= idx.otDataEnd; r++) {
            merges.push({ s: { r, c: 3 }, e: { r, c: 5 } });
        }
        merges.push({ s: { r: idx.otTotal, c: 3 }, e: { r: idx.otTotal, c: 5 } });
    }
    ws['!merges'] = merges;

    // ===== 列印設定 =====
    ws['!print'] = { orientation: 'portrait', paper: 9, fitToWidth: 1, fitToHeight: 0 };
    ws['!margins'] = { left: 0.4, right: 0.4, top: 0.4, bottom: 0.4, header: 0.2, footer: 0.3 };
    ws['!header'] = { odd: '' };
    ws['!footer'] = { odd: '&C第 &P 頁，共 &N 頁' };

    XLSX.utils.book_append_sheet(wb, ws, (office || '整理總表').substring(0, 31));

    const officeSuffix = office ? `_${office}` : '';
    const fileName = `${resultData.fileName}${officeSuffix}_整理總表.xlsx`;
    XLSX.writeFile(wb, fileName);
}

// ===== 查無資料彈窗 =====
function showNoDataModal(filename) {
    document.getElementById('modalFileName').textContent = filename;
    document.getElementById('noDataModal').classList.add('show');
}
function closeNoDataModal() {
    document.getElementById('noDataModal').classList.remove('show');
    resetPage();
}
function copyLogAndClose() {
    const logText = document.getElementById('logArea').textContent || '';
    const fileName = document.getElementById('modalFileName').textContent || '';
    const payload = `[檔案] ${fileName}\n\n[log]\n${logText}`;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(payload).then(() => {
            alert('log 已複製,可貼至回報信');
            closeNoDataModal();
        });
    } else {
        const ta = document.createElement('textarea');
        ta.value = payload;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('log 已複製');
        closeNoDataModal();
    }
}
</script>
